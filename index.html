<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A6B45">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>和声 · Harmony Path</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEDE8;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E5E3DD;--border2:#D0CEC8;
  --text:#1C1B18;--text2:#4A4845;--muted:#8C8A84;--muted2:#B8B6B0;
  --accent:#1A6B45;--accent-bg:#E8F4EE;--amber:#92560A;--amber-bg:#FBF2E6;
  --purple:#6B3FA0;--purple-bg:#F0E8F7;--red:#9B2C2C;--blue:#1D4E89;
  --radius:10px;--radius-sm:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;overflow-x:clip;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:200;}
.site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:calc(env(safe-area-inset-top) + 16px);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1100px;margin:0 auto;}
.logo h1{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;}
.logo h1 span{color:var(--accent);}
.logo p{font-size:0.65rem;color:var(--muted);margin-top:1px;letter-spacing:0.02em;}
.header-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbtn{font-family:inherit;font-size:0.72rem;font-weight:600;padding:7px 12px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.nav{display:flex;width:max-content;min-width:100%;padding:0 10px;max-width:1100px;margin:0 auto;}
.ntab{font-family:inherit;font-weight:700;font-size:0.74rem;padding:11px 13px;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ntab .lock{font-size:0.7rem;opacity:0.5;}
.ntab .mod-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);}
.ntab .mod-dot.done{background:var(--accent);}
.ntab .mod-dot.part{background:var(--amber);}
.wrap{max-width:1100px;margin:0 auto;padding:18px 18px 60px;}
.mod-head{margin-bottom:6px;}
.mod-head .mtag{font-size:0.6rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
.mod-head h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;margin-top:3px;}
.mod-head p{font-size:0.82rem;color:var(--text2);margin-top:6px;line-height:1.5;max-width:680px;}
.mod-prog{display:flex;align-items:center;gap:10px;margin:14px 0 4px;}
.bar{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bar > i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .4s;}
.mod-prog span{font-size:0.66rem;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.lesson{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border2);border-radius:var(--radius);padding:14px 15px;margin-top:10px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative;}
.lesson:hover{box-shadow:var(--shadow);}
.lesson:active{transform:scale(.997);}
.lesson.locked{cursor:not-allowed;opacity:0.6;background:var(--surface2);}
.lesson.mastered{border-left-color:var(--accent);}
.lesson.available{border-left-color:var(--amber);}
.lesson.cp{border-left-color:var(--purple);background:linear-gradient(0deg,var(--purple-bg),var(--surface) 60%);}
.lesson.cp.mastered{border-left-color:var(--accent);}
.l-badge{width:38px;height:38px;min-width:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem;font-family:'JetBrains Mono',monospace;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border2);}
.l-badge.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-badge.available{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.l-badge.cp{background:var(--purple-bg);color:var(--purple);border-color:#C4A8DC;}
.l-badge.cp.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-main{flex:1;min-width:0;}
.l-title{font-size:0.92rem;font-weight:700;line-height:1.3;}
.l-focus{font-size:0.74rem;color:var(--muted);margin-top:3px;line-height:1.45;}
.l-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:0.56rem;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.chip.tempo{background:var(--amber-bg);border-color:#E8C07A;color:var(--amber);}
.chip.covers{background:var(--accent-bg);border-color:#A8C0DC;color:var(--blue);}
.chip.cp{background:var(--purple-bg);border-color:#C4A8DC;color:var(--purple);}
.l-status{font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;align-self:flex-start;white-space:nowrap;}
.l-status.mastered{color:var(--accent);}
.l-status.available{color:var(--amber);}
.l-status.locked{color:var(--muted2);}
.scrim{display:none;position:fixed;inset:0;background:rgba(28,27,24,.45);z-index:899;}
.scrim.open{display:block;}
.detail{display:none;position:fixed;inset:0;z-index:910;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
.detail.open{display:flex;}
.d-close{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.65rem;color:var(--muted);font-weight:700;position:sticky;top:0;z-index:10;letter-spacing:0.05em;text-transform:uppercase;}
.d-close button{border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 14px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:inherit;}
.d-body{padding:24px 20px calc(env(safe-area-inset-bottom) + 40px);max-width:720px;margin:0 auto;width:100%;}
.d-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
.d-focus{font-size:0.95rem;color:var(--text2);margin-top:8px;line-height:1.6;}
.d-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.d-section{margin-top:24px;}
.d-h{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:11px;}
.d-h.cp{color:var(--purple);}
.d-h.std{color:var(--amber);}
.item{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.check{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.check.on{background:var(--accent);border-color:var(--accent);}
.check.on::after{content:'✓';color:#fff;font-size:0.8rem;font-weight:800;}
.check.std.on{background:var(--amber);border-color:var(--amber);}
.item-text{font-size:0.9rem;line-height:1.55;color:var(--text2);flex:1;}
.std .item-text{font-weight:600;color:var(--text);}
.notes{width:100%;border:1.5px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:0.88rem;font-family:inherit;color:var(--text);background:var(--surface2);resize:vertical;min-height:80px;line-height:1.55;-webkit-appearance:none;}
.notes:focus{outline:none;border-color:var(--accent);}
.cp-note{background:var(--purple-bg);border:1px solid #C4A8DC;border-radius:var(--radius);padding:14px 16px;font-size:0.85rem;line-height:1.6;color:var(--text2);}
.cp-note b{color:var(--purple);}
.master-btn{width:100%;margin-top:26px;padding:16px;border-radius:var(--radius);border:none;font-family:inherit;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:0.02em;}
.master-btn.ready{background:var(--accent);color:#fff;}
.master-btn.ready:hover{background:#145535;}
.master-btn.notready{background:var(--surface2);color:var(--muted2);border:1.5px solid var(--border);cursor:not-allowed;}
.master-btn.done{background:var(--accent-bg);color:var(--accent);border:1.5px solid var(--accent);}
.gate-hint{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:10px;}
.unmark{display:block;margin:14px auto 0;background:none;border:none;color:var(--muted);font-size:0.72rem;text-decoration:underline;cursor:pointer;font-family:inherit;}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:14px;box-shadow:var(--shadow-sm);}
.bcard-title{font-size:0.95rem;font-weight:800;color:var(--accent);margin-bottom:3px;}
.bcard-sub{font-size:0.66rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.bcard ul{list-style:none;}
.bcard li{font-size:0.84rem;line-height:1.55;padding:6px 0 6px 20px;position:relative;border-bottom:1px solid var(--border);}
.bcard li:last-child{border-bottom:none;}
.bcard li::before{content:'›';position:absolute;left:2px;top:5px;color:var(--accent);font-weight:800;}
.road{margin-top:6px;}
.road-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.road-row:last-child{border-bottom:none;}
.road-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap;min-width:74px;text-align:center;background:var(--accent-bg);color:var(--accent);}
.road-tag.c{background:var(--purple-bg);color:var(--purple);}
.road-tag.peak{background:#FBEAEA;color:var(--red);}
.road-body{font-size:0.8rem;color:var(--text2);line-height:1.45;}
.road-body b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;}
.pmod{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.pmod:last-child{border-bottom:none;}
.pmod-n{font-size:0.7rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:26px;}
.pmod-t{flex:1;font-size:0.86rem;font-weight:600;}
.pmod-c{font-size:0.66rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 22px;border-radius:24px;font-size:0.82rem;font-weight:700;z-index:999;transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}
.storage-banner{background:var(--amber-bg);color:var(--amber);font-size:0.72rem;padding:8px 16px;text-align:center;font-weight:600;display:none;}
/* ---- audio tool panel ---- */
.tool-panel{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-top:14px;box-shadow:var(--shadow-sm);}
.tool-panel .t-title{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.t-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:6px;}
.t-label{font-size:0.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;min-width:100%;margin-top:6px;}
.tbtn{font-family:inherit;font-size:0.78rem;font-weight:700;padding:9px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;transition:all .15s;}
.tbtn:hover{background:#145535;}
.tbtn.sec{background:var(--surface);color:var(--accent);}
.tbtn.sec:hover{background:var(--accent-bg);}
.tbtn.warn{background:var(--surface);color:var(--amber);border-color:var(--amber);}
.tsel{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:500;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);}
.t-hint{font-size:0.7rem;color:var(--muted);margin-top:9px;line-height:1.5;}
/* ---- live tuner ---- */
.pd{margin-top:11px;padding:11px 12px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);background:var(--surface2);transition:border-color .15s,background .15s;}
.pd.locked{border-style:solid;border-color:var(--accent);background:var(--accent-bg);}
.pd-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pd-read{display:flex;align-items:baseline;gap:7px;font-family:'JetBrains Mono',monospace;}
.pd-note{font-size:1.25rem;font-weight:700;color:var(--text);min-width:42px;}
.pd-cents{font-size:0.72rem;color:var(--muted);}
.pd-lock{margin-left:auto;font-size:0.66rem;font-weight:800;letter-spacing:0.04em;padding:3px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
.pd-lock.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.pd-lock.sharp,.pd-lock.flat{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.pd-meter{position:relative;height:12px;margin-top:10px;border-radius:6px;background:linear-gradient(90deg,#E8C07A22,#E8C07A11 40%,var(--accent-bg) 50%,#E8C07A11 60%,#E8C07A22);border:1px solid var(--border);overflow:hidden;}
.pd-zone{position:absolute;left:calc(50% - 9%);width:18%;top:0;bottom:0;background:rgba(26,107,69,.16);border-left:1px solid var(--accent);border-right:1px solid var(--accent);}
.pd-needle{position:absolute;top:-2px;bottom:-2px;width:3px;left:50%;transform:translateX(-50%);background:var(--text);border-radius:2px;transition:left .07s linear,background .15s;}
.pd.locked .pd-needle{background:var(--accent);}
.pd-msg{display:none;font-size:0.72rem;color:var(--red);font-weight:600;margin-top:9px;line-height:1.45;}
.pd-msg.show{display:block;}
/* ---- in-app recorder ---- */
.rec{margin-top:12px;padding:13px 14px;border:1.5px solid var(--purple);border-radius:var(--radius);background:linear-gradient(0deg,var(--purple-bg),var(--surface) 70%);}
.rec-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.rec-btn{font-family:inherit;font-size:0.82rem;font-weight:800;padding:10px 16px;border-radius:var(--radius-sm);border:none;background:var(--red);color:#fff;cursor:pointer;display:flex;align-items:center;gap:7px;}
.rec-btn.stop{background:var(--text);}
.rec-dot{width:9px;height:9px;border-radius:50%;background:#fff;}
.rec-btn.live .rec-dot{animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1}50%{opacity:.25}}
.rec-time{font-family:'JetBrains Mono',monospace;font-size:0.9rem;font-weight:600;color:var(--text2);}
.rec audio{width:100%;margin-top:11px;height:38px;}
.rec-dl{display:inline-block;margin-top:9px;font-size:0.74rem;font-weight:700;color:var(--purple);text-decoration:underline;cursor:pointer;}
.rec-hint{font-size:0.68rem;color:var(--muted);margin-top:8px;line-height:1.5;}
/* ---- tempo slider + count-in ---- */
.slider-row{display:flex;align-items:center;gap:11px;margin-top:8px;}
.slider-row label{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;min-width:48px;}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:4px;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:600;color:var(--accent);min-width:62px;text-align:right;}
.toggle-chip{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;padding:7px 11px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;user-select:none;}
.toggle-chip.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.toggle-chip .tg{width:14px;height:14px;border-radius:3px;border:2px solid var(--border2);}
.toggle-chip.on .tg{background:var(--accent);border-color:var(--accent);}
/* ---- metronome ---- */
.metro-dot{width:54px;height:54px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;color:var(--muted);transition:transform .05s,background .05s,color .05s,border-color .05s;}
.metro-dot.beat{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.12);}
.metro-dot.accent{background:var(--amber);border-color:var(--amber);}
/* ---- quick drill ---- */
.qd-cta{width:100%;margin-top:14px;padding:15px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:0.92rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:var(--shadow-sm);}
.qd-cta:hover{background:#145535;}
.qd-cta.sec{background:var(--purple-bg);color:var(--purple);border:1.5px solid #C4A8DC;box-shadow:none;}
.qd-big{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:700;text-align:center;color:var(--accent);margin:6px 0;}
.qd-sub{text-align:center;font-size:0.78rem;color:var(--muted);margin-bottom:14px;}
.score-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:6px;}
.score-btn{width:42px;height:42px;border-radius:11px;border:1.5px solid var(--border2);background:var(--surface);font-size:1.3rem;font-weight:700;color:var(--accent);cursor:pointer;font-family:inherit;}
.score-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;min-width:70px;text-align:center;}
/* ---- streak card ---- */
.streak{display:flex;gap:10px;margin-top:14px;}
.streak-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.streak-box .sk-n{font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:700;color:var(--accent);line-height:1;}
.streak-box .sk-l{font-size:0.6rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.road-tag.mando{background:#FBEAF2;color:#9B2C6B;}
@media(max-width:768px){
  .site-header{padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;}
  .logo p{display:none;}
  .ntab{font-size:0.84rem;padding:12px 13px;}
  .d-title{font-size:1.25rem;}
  .item-text{font-size:0.95rem;}
  .l-title{font-size:1rem;}
  .l-focus{font-size:0.82rem;}
}
</style>
</head>
<body>
<div class="topbar">
<header class="site-header"><div class="header-inner">
  <div class="logo"><h1>和声 <span>· Harmony Path</span></h1><p>Vocal Harmony · Pop & Folk Duets · Self-Paced Module Path</p></div>
  <div class="header-btns">
    <span style="font-size:0.6rem;color:#B8B6B0;font-family:'JetBrains Mono',monospace;align-self:center;padding-right:2px" title="build">v7</span>
    <button class="hbtn" onclick="doExport()">Backup</button>
    <button class="hbtn" onclick="document.getElementById('imp').click()">Restore</button>
    <button class="hbtn" onclick="doReset()">Reset</button>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="doImport(event)">

{n:1,t:'Hear & Hold a Note',g:'Harmony is mostly the skill of not being pulled onto someone else’s note. Before you sing different notes, you learn to hold your own note rock-steady while hearing something else. Everything later is built on this.',lessons:[

/* ===================== AUDIO ENGINE ===================== */
let actx=null,droneNodes=[],sessionMode='playback',actxMode='playback';
const TS={root:0,intv:4,key:0,droneOn:false,drone5:false,bpm:96,countin:true};
function setAudioSession(mode){
 /* iOS WebKit AudioSession. 'playback' is output-only and is INCOMPATIBLE with
    mic capture; 'play-and-record' allows both. We remember the requested mode so a
    freshly created AudioContext adopts it. */
 sessionMode=mode;
 if(navigator.audioSession){try{navigator.audioSession.type=mode;}catch(e){}}
}
function ac(){
 if(!actx){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  actxMode=sessionMode;
  if(navigator.audioSession){try{navigator.audioSession.type=sessionMode;}catch(e){}}
 }
 if(actx.state==='suspended')actx.resume();
 return actx;
}
/* iOS will not switch a live AudioContext between output-only ('playback') and
   capture ('play-and-record'), and stopping the mic can leave a play-and-record
   context unable to play. So we rebuild the context on each transition, restarting
   the drone if it was on. Transitions are serialized on a promise chain to avoid
   close/create races. */
let acChain=Promise.resolve();
function rebuildContext(mode){
 const wasDrone=TS.droneOn;
 return (actx?actx.close().catch(()=>{}):Promise.resolve()).then(()=>{
  actx=null;droneNodes=[];TS.droneOn=false;pdSource=null;pdAnalyser=null;pdSink=null;
  setAudioSession(mode);ac();syncDroneBtns();
  if(wasDrone)toggleDrone();
 });
}
function enterCaptureMode(){
 acChain=acChain.then(()=>{
  setAudioSession('play-and-record');
  if(actx && actxMode!=='play-and-record')return rebuildContext('play-and-record');
  ac();
 });
 return acChain;
}
function exitCaptureMode(){
 acChain=acChain.then(()=>{
  if(pdActive||(mediaRec&&mediaRec.state==='recording'))return; // capture resumed
  setAudioSession('playback');
  if(actx && actxMode!=='playback')return rebuildContext('playback');
 });
 return acChain;
}
/* iOS unlock: the context only truly starts inside a user gesture — resume it and
   play one silent sample on the first touch/click anywhere. */
function unlockAudio(){
 const a=ac();
 const kick=()=>{try{const b=a.createBuffer(1,1,22050);const s=a.createBufferSource();s.buffer=b;s.connect(a.destination);s.start(0);}catch(e){}};
 if(a.state==='running')kick();else a.resume().then(kick).catch(()=>{});
 document.removeEventListener('touchend',unlockAudio);
 document.removeEventListener('click',unlockAudio);
}
document.addEventListener('touchend',unlockAudio,{passive:true});
document.addEventListener('click',unlockAudio);
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freq(s){return 261.626*Math.pow(2,s/12);}
function nlabel(s){return NN[((s%12)+12)%12]+(4+Math.floor(s/12));}
function tone(s,dur,when,vol){
 const a=ac();
 const go=()=>{const o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=freq(s);const t=a.currentTime+(when||0);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.25,t+0.03);g.gain.setValueAtTime(vol||0.25,t+dur-0.08);g.gain.linearRampToValueAtTime(0,t+dur);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.05);};
 if(a.state==='running')go();else a.resume().then(go).catch(go);
}
/* a single percussive metronome click, optionally scheduled ahead */
function metroClick(accent,when){
 const a=ac();const t=a.currentTime+(when||0);
 const o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=accent?1760:1200;
 g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(accent?0.3:0.2,t+0.004);g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
 o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.09);
}
function playRoot(){setTarget(TS.root);tone(TS.root,1.5,0);}
function playOff(off){setTarget(TS.root+off);tone(TS.root+off,1.5,0);}
function playBoth(off){setTarget(TS.root+off);tone(TS.root,2,0,0.18);tone(TS.root+off,2,0,0.18);}
function stopDrone(){if(droneNodes.length){const a=ac();droneNodes.forEach(n=>{try{n.gain.gain.linearRampToValueAtTime(0,a.currentTime+0.2);n.osc.stop(a.currentTime+0.25);}catch(e){}});droneNodes=[];TS.droneOn=false;syncDroneBtns();}}
function addDrone(off,type,vol){const a=ac();const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=freq(TS.root+off);g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(vol,a.currentTime+0.3);o.connect(g);g.connect(a.destination);o.start();droneNodes.push({osc:o,gain:g,off:off});}
function toggleDrone(){
 if(droneNodes.length){stopDrone();return;}
 const a=ac();
 const go=()=>{if(droneNodes.length)return;setTarget(TS.root);addDrone(0,'triangle',0.13);addDrone(-12,'sine',0.11);if(TS.drone5)addDrone(7,'sine',0.05);TS.droneOn=true;syncDroneBtns();};
 if(a.state==='running')go();else a.resume().then(go).catch(go);
}
function toggleDrone5(el){TS.drone5=!TS.drone5;if(el)el.classList.toggle('on',TS.drone5);if(droneNodes.length){stopDrone();toggleDrone();}}
function syncDroneBtns(){document.querySelectorAll('.droneBtn').forEach(b=>{b.textContent=TS.droneOn?'■ Stop drone':'▶ Start drone';});}
function reTuneDrone(){if(droneNodes.length){const a=ac();droneNodes.forEach(n=>n.osc.frequency.setValueAtTime(freq(TS.root+n.off),a.currentTime));}}
function setRoot(v){TS.root=parseInt(v,10);setTarget(TS.root);reTuneDrone();}
function randRoot(){TS.root=-12+Math.floor(Math.random()*20);document.querySelectorAll('.rootSel').forEach(s=>{s.value=TS.root;});reTuneDrone();playRoot();}
/* Row Row Row Your Boat — [semitones from C4, beats] */
const MEL=[[0,3],[0,3],[0,2],[2,1],[4,3],[4,2],[2,1],[4,2],[5,1],[7,6],
[12,1],[12,1],[12,1],[7,1],[7,1],[7,1],[4,1],[4,1],[4,1],[0,1],[0,1],[0,1],
[7,2],[5,1],[4,2],[2,1],[0,6]];
const T3={0:4,2:5,4:7,5:9,7:11,12:16};
function setBpm(v){TS.bpm=parseInt(v,10);const el=document.getElementById('bpmVal');if(el)el.textContent=TS.bpm+' bpm';}
function toggleCountin(el){TS.countin=!TS.countin;if(el)el.classList.toggle('on',TS.countin);}
function playSeq(part,both){
 const a=ac();const beat=60/TS.bpm;let t=0.12;
 if(TS.countin){for(let i=0;i<4;i++)metroClick(i===0,t+i*beat);t+=4*beat;}
 MEL.forEach(n=>{const d=n[1]*beat;if(part!=='harm')tone(n[0]+TS.key,d*0.95,t,0.2);if(part==='harm'||both)tone(T3[n[0]]+TS.key,d*0.95,t,part==='harm'?0.2:0.13);t+=d;});
}
/* ===================== LIVE PITCH ENGINE ===================== */
let micStream=null,pdSource=null,pdAnalyser=null,pdSink=null,pdBuf=null,pdActive=false,pdHost=null,pdRAF=null,pdSmooth=0,pdFrame=0,pdTargetHz=0,pdHold=0;
function setTarget(semi){pdTargetHz=freq(semi);}
async function getMic(){
 if(micStream)return micStream;
 try{micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});}
 catch(e){if(e&&(e.name==='OverconstrainedError'||e.name==='TypeError'||e.name==='NotReadableError')){micStream=await navigator.mediaDevices.getUserMedia({audio:true});}else{throw e;}}
 return micStream;
}
function maybeReleaseMic(){
 if(pdActive||(mediaRec&&mediaRec.state==='recording'))return;
 if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
 pdSource=null;pdAnalyser=null;pdSink=null;
 exitCaptureMode();
}
async function ensurePitch(){
 await enterCaptureMode();const a=ac();const stream=await getMic();
 if(!pdSource){
  pdSource=a.createMediaStreamSource(stream);
  pdAnalyser=a.createAnalyser();pdAnalyser.fftSize=4096;
  pdSource.connect(pdAnalyser);
  /* iOS/WebKit only runs the graph (and fills the analyser) if it reaches an
     output, so feed the analyser to a muted sink — silent, but keeps data flowing. */
  pdSink=a.createGain();pdSink.gain.value=0;pdAnalyser.connect(pdSink);pdSink.connect(a.destination);
  pdBuf=new Float32Array(pdAnalyser.fftSize);
 }
 try{await a.resume();}catch(e){}
}
async function togglePitch(hostId){
 if(pdActive&&pdHost===hostId){stopPitch();return;}
 if(!window.isSecureContext){pdError(hostId,'This page is not a secure context (needs https://). The mic API is unavailable here.');return;}
 if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){pdError(hostId,'No microphone API in this browser/context. If installed to the Home Screen, try opening the site in Safari instead.');return;}
 try{await ensurePitch();}
 catch(e){
  const n=(e&&e.name)||'';
  let m;
  if(n==='NotAllowedError'||n==='SecurityError')m='Mic permission is blocked for this site. Safari: tap the ᴀA / page menu in the address bar → Website Settings → Microphone → Allow, then reload. Also check Settings ▸ Screen Time ▸ Content & Privacy.';
  else if(n==='NotFoundError')m='No microphone is available to the browser.';
  else if(n==='NotReadableError')m='The mic is busy or unavailable — close other apps using it and retry.';
  else if(n==='OverconstrainedError')m='Mic settings not supported by this device.';
  else m='Mic request failed — '+(n||'unknown')+(e&&e.message?' ('+e.message+')':'');
  pdError(hostId,m);
  return;
 }
 pdHost=hostId;pdActive=true;pdSmooth=0;clearPdMsg();syncPitchBtns();loopPitch();
}
function pdError(host,msg){const h=document.getElementById(host);if(h){const c=h.querySelector('.pd-cents');if(c)c.textContent='mic blocked';let box=h.querySelector('.pd-msg');if(box){box.textContent=msg;box.classList.add('show');}}showToast('Mic blocked — see the tuner panel');}
function clearPdMsg(){const h=pdHost&&document.getElementById(pdHost);if(h){const box=h.querySelector('.pd-msg');if(box){box.classList.remove('show');box.textContent='';}}}
function stopPitch(){if(pdRAF){cancelAnimationFrame(pdRAF);pdRAF=null;}pdActive=false;const h=pdHost&&document.getElementById(pdHost);if(h){h.classList.remove('locked');const r=h.querySelector('.pd-cents');if(r)r.textContent='tuner off';const no=h.querySelector('.pd-note');if(no)no.textContent='—';const nd=h.querySelector('.pd-needle');if(nd)nd.style.left='50%';const lk=h.querySelector('.pd-lock');if(lk){lk.className='pd-lock';lk.textContent='';}}syncPitchBtns();maybeReleaseMic();}
function syncPitchBtns(){document.querySelectorAll('.pdBtn').forEach(b=>{const on=pdActive&&b.dataset.host===pdHost;b.textContent=on?'■ Stop tuner':'🎤 Live tuner';b.classList.toggle('sec',!on);});}
function autoCorrelate(buf,sr){
 const SIZE=buf.length;
 let c0=0;for(let i=0;i<SIZE;i++)c0+=buf[i]*buf[i];
 if(Math.sqrt(c0/SIZE)<0.008)return -1;            // too quiet to be a sung note
 const minHz=60,maxHz=1100;                         // ~C2 up to ~C#6 — full vocal range
 let minLag=Math.max(2,Math.floor(sr/maxHz));
 let maxLag=Math.min(SIZE-2,Math.ceil(sr/minHz));
 if(maxLag<=minLag)return -1;
 const n=maxLag-minLag+1,corr=new Float32Array(n);
 let best=-1,bestv=0;
 for(let k=0;k<n;k++){
  const lag=minLag+k;let s=0;
  for(let i=0;i<SIZE-lag;i++)s+=buf[i]*buf[i+lag];
  corr[k]=s;
  if(s>bestv){bestv=s;best=k;}
 }
 if(best<0||c0<=0||bestv/c0<0.3)return -1;          // not clearly pitched
 /* Pick the FIRST strong local peak, not the global max — autocorrelation peaks
    just as well at twice the true period, which is what made it read an octave low. */
 const thr=0.86*bestv;let pk=best;
 for(let k=1;k<n-1;k++){if(corr[k]>=thr&&corr[k]>corr[k-1]&&corr[k]>=corr[k+1]){pk=k;break;}}
 let lag=minLag+pk;
 const ym=pk>0?corr[pk-1]:corr[pk],y0=corr[pk],yp=pk<n-1?corr[pk+1]:corr[pk];
 const a2=(ym+yp-2*y0)/2,b2=(yp-ym)/2;
 if(a2)lag=lag-b2/(2*a2);
 const hz=sr/lag;
 return(hz>45&&hz<1500)?hz:-1;
}
function hzToNote(hz){const midi=69+12*Math.log2(hz/440);const r=Math.round(midi);const cents=Math.round((midi-r)*100);return{name:NN[((r%12)+12)%12]+(Math.floor(r/12)-1),cents};}
function centsToTarget(hz){if(pdTargetHz<=0)return null;let s=12*Math.log2(hz/pdTargetHz);while(s>6)s-=12;while(s<=-6)s+=12;return s*100;}

 if(!pdActive){pdRAF=null;return;}

 if(hz>0){pdSmooth=pdSmooth?pdSmooth*0.75+hz*0.25:hz;pdHold=6;}else if(pdHold>0){pdHold--;}

 else if(Math.abs(c)<18){lock.className='pd-lock on';lock.textContent='● LOCKED';h.classList.add('locked');}

  {t:'Mando',c:'mando',b:'<b>小幸运</b> — Hebe Tien. Sustained chorus lines with close-harmony backing in the production to copy.'},
 ];
 return '<div class="mod-head"><div class="mtag">Reference</div><h2>Intervals, Songs & Craft</h2><p>The orientation material: what the intervals sound like, the song ladder for Module 4, and how to isolate a harmony part from a record.</p></div>'+
 '<div class="bcard"><div class="bcard-title">Interval cheat-sheet</div><div class="bcard-sub">root fixed at C4 · tap to hear root → interval → both</div><div class="road">'+iv.map(p=>'<div class="road-row"><span class="road-tag">'+p[1]+'</span><span class="road-body" style="flex:1">'+p[2]+'</span><button class="tbtn sec" style="padding:6px 10px;font-size:0.68rem" onclick="TS.root=0;tone(0,0.8,0);tone('+p[0]+',0.8,0.9);tone(0,1.4,1.9,0.16);tone('+p[0]+',1.4,1.9,0.16)">▶</button></div>').join('')+'</div></div>'+

 '<li>Match phrasing: start and end words exactly together — cutoffs sell the blend.</li>'+

 '<li>Less vibrato than you would use solo — straight tone locks intervals tighter.</li>'+
 '</ul></div>'+
 '<div class="bcard"><div class="bcard-title">和声 in Mandopop</div><div class="bcard-sub">applying the method to your own repertoire</div><ul>'+

function renderProg(){
 const totL=FLAT.length;const doneL=FLAT.filter(isMastered).length;const pct=Math.round(doneL/totL*100);
 const cps=[];MODULES.forEach(m=>m.lessons.forEach(l=>{if(l.cp)cps.push(l);}));
 let h='<div class="mod-head"><div class="mtag">Progress</div><h2>Your Path</h2><p>'+doneL+' of '+totL+' lessons mastered. Each module unlocks the next as you pass its standards — no calendar, only gates.</p><div class="mod-prog"><div class="bar"><i style="width:'+pct+'%"></i></div><span>'+pct+'%</span></div></div>';
 const M=meta();
 h+='<div class="streak"><div class="streak-box"><div class="sk-n">'+(M.streak||0)+'</div><div class="sk-l">Day streak</div></div><div class="streak-box"><div class="sk-n">'+(M.best||0)+'</div><div class="sk-l">Best streak</div></div><div class="streak-box"><div class="sk-n">'+(M.quick||0)+'</div><div class="sk-l">Drills logged</div></div></div>';
 h+='<button class="qd-cta sec" onclick="openQuick()">⚡ Do today\u2019s 5-minute drill</button>';
 h+='<div class="bcard" style="margin-top:14px"><div class="bcard-title">Modules</div><div class="bcard-sub">tap a module tab to open its lessons</div>';
 MODULES.forEach(m=>{const p=moduleProgress(m);const locked=statusOf(m.lessons[0].id)==='locked';h+='<div class="pmod"><div class="pmod-n">M'+m.n+'</div><div class="pmod-t">'+m.t+(locked?' 🔒':'')+'</div><div class="pmod-c">'+p.done+'/'+p.tot+'</div></div>';});
 h+='</div><div class="bcard"><div class="bcard-title">Recording checkpoints</div><div class="bcard-sub">upload these to Claude for review</div>';
 cps.forEach(l=>{const done=isMastered(l.id);const open=statusOf(l.id)!=='locked';h+='<div class="pmod"><div class="pmod-n">'+(done?'✓':(open?'◆':'🔒'))+'</div><div class="pmod-t">'+l.t.replace('Checkpoint — ','')+'</div><div class="pmod-c">'+(done?'passed':(open?'ready':'locked'))+'</div></div>';});
 h+='</div>';
 return h;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doExport(){const blob=new Blob([JSON.stringify({lessons:S,exported:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='harmony-path-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('Backup downloaded');}
function doImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.lessons){S=d.lessons;persist();render();showToast('Progress restored');}}catch(e){showToast('Could not read that file');}};r.readAsText(f);ev.target.value='';}
function doReset(){if(!confirm('Erase all progress and start the path fresh? Export a backup first if unsure.'))return;S={};persist();render();showToast('Progress reset');}
