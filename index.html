<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A6B45">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>和声 · Harmony Path</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEDE8;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E5E3DD;--border2:#D0CEC8;
  --text:#1C1B18;--text2:#4A4845;--muted:#8C8A84;--muted2:#B8B6B0;
  --accent:#1A6B45;--accent-bg:#E8F4EE;--amber:#92560A;--amber-bg:#FBF2E6;
  --purple:#6B3FA0;--purple-bg:#F0E8F7;--red:#9B2C2C;--blue:#1D4E89;
  --radius:10px;--radius-sm:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;overflow-x:clip;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:200;}
.site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:calc(env(safe-area-inset-top) + 16px);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1100px;margin:0 auto;}
.logo h1{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;}
.logo h1 span{color:var(--accent);}
.logo p{font-size:0.65rem;color:var(--muted);margin-top:1px;letter-spacing:0.02em;}
.header-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbtn{font-family:inherit;font-size:0.72rem;font-weight:600;padding:7px 12px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.nav{display:flex;width:max-content;min-width:100%;padding:0 10px;max-width:1100px;margin:0 auto;}
.ntab{font-family:inherit;font-weight:700;font-size:0.74rem;padding:11px 13px;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ntab .lock{font-size:0.7rem;opacity:0.5;}
.ntab .mod-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);}
.ntab .mod-dot.done{background:var(--accent);}
.ntab .mod-dot.part{background:var(--amber);}
.wrap{max-width:1100px;margin:0 auto;padding:18px 18px 60px;}
.mod-head{margin-bottom:6px;}
.mod-head .mtag{font-size:0.6rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
.mod-head h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;margin-top:3px;}
.mod-head p{font-size:0.82rem;color:var(--text2);margin-top:6px;line-height:1.5;max-width:680px;}
.mod-prog{display:flex;align-items:center;gap:10px;margin:14px 0 4px;}
.bar{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bar > i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .4s;}
.mod-prog span{font-size:0.66rem;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.lesson{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border2);border-radius:var(--radius);padding:14px 15px;margin-top:10px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative;}
.lesson:hover{box-shadow:var(--shadow);}
.lesson:active{transform:scale(.997);}
.lesson.locked{cursor:not-allowed;opacity:0.6;background:var(--surface2);}
.lesson.mastered{border-left-color:var(--accent);}
.lesson.available{border-left-color:var(--amber);}
.lesson.cp{border-left-color:var(--purple);background:linear-gradient(0deg,var(--purple-bg),var(--surface) 60%);}
.lesson.cp.mastered{border-left-color:var(--accent);}
.l-badge{width:38px;height:38px;min-width:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem;font-family:'JetBrains Mono',monospace;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border2);}
.l-badge.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-badge.available{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.l-badge.cp{background:var(--purple-bg);color:var(--purple);border-color:#C4A8DC;}
.l-badge.cp.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-main{flex:1;min-width:0;}
.l-title{font-size:0.92rem;font-weight:700;line-height:1.3;}
.l-focus{font-size:0.74rem;color:var(--muted);margin-top:3px;line-height:1.45;}
.l-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:0.56rem;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.chip.tempo{background:var(--amber-bg);border-color:#E8C07A;color:var(--amber);}
.chip.covers{background:var(--accent-bg);border-color:#A8C0DC;color:var(--blue);}
.chip.cp{background:var(--purple-bg);border-color:#C4A8DC;color:var(--purple);}
.l-status{font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;align-self:flex-start;white-space:nowrap;}
.l-status.mastered{color:var(--accent);}
.l-status.available{color:var(--amber);}
.l-status.locked{color:var(--muted2);}
.scrim{display:none;position:fixed;inset:0;background:rgba(28,27,24,.45);z-index:899;}
.scrim.open{display:block;}
.detail{display:none;position:fixed;inset:0;z-index:910;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
.detail.open{display:flex;}
.d-close{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.65rem;color:var(--muted);font-weight:700;position:sticky;top:0;z-index:10;letter-spacing:0.05em;text-transform:uppercase;}
.d-close button{border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 14px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:inherit;}
.d-body{padding:24px 20px calc(env(safe-area-inset-bottom) + 40px);max-width:720px;margin:0 auto;width:100%;}
.d-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
.d-focus{font-size:0.95rem;color:var(--text2);margin-top:8px;line-height:1.6;}
.d-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.d-section{margin-top:24px;}
.d-h{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:11px;}
.d-h.cp{color:var(--purple);}
.d-h.std{color:var(--amber);}
.item{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.check{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.check.on{background:var(--accent);border-color:var(--accent);}
.check.on::after{content:'✓';color:#fff;font-size:0.8rem;font-weight:800;}
.check.std.on{background:var(--amber);border-color:var(--amber);}
.item-text{font-size:0.9rem;line-height:1.55;color:var(--text2);flex:1;}
.std .item-text{font-weight:600;color:var(--text);}
.notes{width:100%;border:1.5px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:0.88rem;font-family:inherit;color:var(--text);background:var(--surface2);resize:vertical;min-height:80px;line-height:1.55;-webkit-appearance:none;}
.notes:focus{outline:none;border-color:var(--accent);}
.cp-note{background:var(--purple-bg);border:1px solid #C4A8DC;border-radius:var(--radius);padding:14px 16px;font-size:0.85rem;line-height:1.6;color:var(--text2);}
.cp-note b{color:var(--purple);}
.master-btn{width:100%;margin-top:26px;padding:16px;border-radius:var(--radius);border:none;font-family:inherit;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:0.02em;}
.master-btn.ready{background:var(--accent);color:#fff;}
.master-btn.ready:hover{background:#145535;}
.master-btn.notready{background:var(--surface2);color:var(--muted2);border:1.5px solid var(--border);cursor:not-allowed;}
.master-btn.done{background:var(--accent-bg);color:var(--accent);border:1.5px solid var(--accent);}
.gate-hint{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:10px;}
.unmark{display:block;margin:14px auto 0;background:none;border:none;color:var(--muted);font-size:0.72rem;text-decoration:underline;cursor:pointer;font-family:inherit;}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:14px;box-shadow:var(--shadow-sm);}
.bcard-title{font-size:0.95rem;font-weight:800;color:var(--accent);margin-bottom:3px;}
.bcard-sub{font-size:0.66rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.bcard ul{list-style:none;}
.bcard li{font-size:0.84rem;line-height:1.55;padding:6px 0 6px 20px;position:relative;border-bottom:1px solid var(--border);}
.bcard li:last-child{border-bottom:none;}
.bcard li::before{content:'›';position:absolute;left:2px;top:5px;color:var(--accent);font-weight:800;}
.road{margin-top:6px;}
.road-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.road-row:last-child{border-bottom:none;}
.road-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap;min-width:74px;text-align:center;background:var(--accent-bg);color:var(--accent);}
.road-tag.c{background:var(--purple-bg);color:var(--purple);}
.road-tag.peak{background:#FBEAEA;color:var(--red);}
.road-body{font-size:0.8rem;color:var(--text2);line-height:1.45;}
.road-body b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;}
.pmod{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.pmod:last-child{border-bottom:none;}
.pmod-n{font-size:0.7rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:26px;}
.pmod-t{flex:1;font-size:0.86rem;font-weight:600;}
.pmod-c{font-size:0.66rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 22px;border-radius:24px;font-size:0.82rem;font-weight:700;z-index:999;transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}
.storage-banner{background:var(--amber-bg);color:var(--amber);font-size:0.72rem;padding:8px 16px;text-align:center;font-weight:600;display:none;}
/* ---- audio tool panel ---- */
.tool-panel{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-top:14px;box-shadow:var(--shadow-sm);}
.tool-panel .t-title{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.t-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:6px;}
.t-label{font-size:0.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;min-width:100%;margin-top:6px;}
.tbtn{font-family:inherit;font-size:0.78rem;font-weight:700;padding:9px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;transition:all .15s;}
.tbtn:hover{background:#145535;}
.tbtn.sec{background:var(--surface);color:var(--accent);}
.tbtn.sec:hover{background:var(--accent-bg);}
.tbtn.warn{background:var(--surface);color:var(--amber);border-color:var(--amber);}
.tsel{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:500;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);}
.t-hint{font-size:0.7rem;color:var(--muted);margin-top:9px;line-height:1.5;}
@media(max-width:768px){
  .site-header{padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;}
  .logo p{display:none;}
  .ntab{font-size:0.84rem;padding:12px 13px;}
  .d-title{font-size:1.25rem;}
  .item-text{font-size:0.95rem;}
  .l-title{font-size:1rem;}
  .l-focus{font-size:0.82rem;}
}
</style>
</head>
<body>
<div class="topbar">
<header class="site-header"><div class="header-inner">
  <div class="logo"><h1>和声 <span>· Harmony Path</span></h1><p>Vocal Harmony · Pop & Folk Duets · Self-Paced Module Path</p></div>
  <div class="header-btns">
    <button class="hbtn" onclick="doExport()">Backup</button>
    <button class="hbtn" onclick="document.getElementById('imp').click()">Restore</button>
    <button class="hbtn" onclick="doReset()">Reset</button>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="doImport(event)">
  </div>
</div></header>
<div class="storage-banner" id="sb">⚠ Browser storage unavailable — progress won't save this session.</div>
<div class="nav-wrap"><div class="nav" id="nav"></div></div>
</div>
<main class="wrap" id="main"></main>
<div class="scrim" id="scrim" onclick="closeDetail()"></div>
<div class="detail" id="detail"><div class="d-close"><span id="dCrumb">Lesson</span><button onclick="closeDetail()">✕ Close</button></div><div class="d-body" id="dBody"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ===================== PROGRAM DATA ===================== */
const MODULES=[
{n:1,t:'Hear & Hold a Note',g:'Harmony is mostly the skill of not being pulled onto someone else’s note. Before you sing different notes, you learn to hold your own note rock-steady while hearing something else. Everything later is built on this.',lessons:[
 {id:'1.1',t:'Land the Note',f:'Hit a played pitch instantly — no scooping up to it.',time:'~10 min',covers:'Pitch accuracy',tool:'tone',
  tasks:['Play a note in your comfortable range with the tone player. Sing it on “ooh” and hold for a slow count of 8.','Record yourself on your phone and listen back: did you start under the note and slide up? Most beginners scoop — aim to land dead-on instantly.','Repeat on five different roots, low and high.'],
  stds:['You land on the played note instantly, without sliding up to it.','You can hold it for 8 counts without drifting.','You verified this by listening back to a recording — not just by feel.']},
 {id:'1.2',t:'Hold Against the Drone',f:'Sustain your note while the same note drones underneath.',time:'~10 min',covers:'Stability',tool:'tone',
  tasks:['Start the drone. Sing the same note and hold 8 counts. When you are perfectly in tune the two voices fuse — learn that fused sound.','If you hear a slow “wah-wah-wah” beating, you are slightly off. Nudge your pitch until the beating stops.','Three holds per session, recorded once.'],
  stds:['A unison hold for 8 counts with no audible beating.','You can deliberately drift off the note and pull back into the fused sound.']},
 {id:'1.3',t:'The Tug-of-War',f:'Hold your note while the drone plays a DIFFERENT note.',time:'~10 min',covers:'Independence',tool:'tone',
  tasks:['Drone on the root. Use the second-note buttons to hear a 3rd or 5th, sing that note, then keep holding it while the drone continues.','Your note will feel tugged toward the drone — do not let it move. That feeling of two notes ringing against each other IS harmony.','Record one hold per session and check it stayed put.'],
  stds:['You hold your note 8 counts against a different droning note.','Three clean holds in a row, confirmed by recording.']},
 {id:'1.4',t:'Steps Away',f:'Move deliberately while the drone stays still.',time:'~10 min',covers:'Controlled movement',tool:'tone',
  tasks:['With the drone on “do”, sing do–re–do slowly. Then do–re–mi–re–do.','Move slowly and deliberately; land each step, do not slide between them.','Finish each pass by locking back into unison with the drone.'],
  stds:['The steps are in tune on the way up and the way down.','The return to unison locks (no beating) every time.']},
 {id:'cpA',cp:true,t:'Checkpoint — The Drone Hold',f:'Prove the foundation holds before building on it.',covers:'Module 1',
  rec:['Record ~45 seconds: with the drone on one note, sing and hold a different note (a 3rd or 5th) for 8 counts, three separate times.'],
  stds:['No audible drift on any of the three holds.','Each note is landed instantly, no scooping.']},
]},
{n:2,t:'Find the Third',g:'Roughly 80% of pop and folk harmony is singing a third above or below the melody — the warm sound in every Everly Brothers and Simon & Garfunkel record. A third is “do” up to “mi”. If you can find a third on demand, you can already harmonize simple songs.',lessons:[
 {id:'2.1',t:'Walk Up to It',f:'Find the third by stepping: do–re–mi, hold the mi.',time:'~10 min',covers:'Interval: major 3rd',tool:'interval',
  tasks:['Play a root. Sing do–re–mi up from it and hold the “mi”.','Press “Reveal answer” to check yourself. Then “Both together” to hear the third ringing against the root.','Repeat across ten different roots.'],
  stds:['You can land the third by walking up, from any root in your range.']},
 {id:'2.2',t:'Jump to It',f:'Hear the root, sing the third directly — no walking.',time:'~15 min',covers:'The core skill',tool:'interval',
  tasks:['Use “Random root” so you cannot memorize. Hear the root, jump straight to the third, then reveal.','Score yourself out of 10 every session and log it in the practice notes below — watch the number climb.','This is the highest-value drill in the whole program. When short on time, do this.'],
  stds:['8 out of 10 random roots: third sung correctly, jumping straight to it.']},
 {id:'2.3',t:'The Lock',f:'Hold the third against the drone and learn its “ring”.',time:'~10 min',covers:'Tuning by ear',tool:'tone',
  tasks:['Drone on a root. Sing the third above and hold it.','When a third locks in, the combined sound goes smooth and sweet. Bend your note slightly off and back, until you can feel the lock engage.','This lock feeling is the tuning instinct you will rely on forever — it tells you you are right without thinking.'],
  stds:['You hold a locked third for 8 counts.','You can reliably tell a locked third from a slightly-off one.']},
 {id:'2.4',t:'The Other Intervals',f:'The 5th, the 4th and the 6th — harmony’s supporting cast.',time:'~10 min',covers:'Intervals: 4th, 5th, 6th',tool:'interval',
  tasks:['Same jump game with the perfect 5th — think the first two notes of “Twinkle Twinkle”.','Then the perfect 4th — “Here Comes the Bride” — and the major 6th — the “My Bon-” of “My Bonnie”.','Mix all intervals with random roots once each feels stable.'],
  stds:['7 out of 10 on the 5th.','7 out of 10 on the 4th.','You can sing a minor 3rd when asked (use the selector to compare it with major).']},
 {id:'cpB',cp:true,t:'Checkpoint — Ten Random Thirds',f:'The gate into real harmony singing.',covers:'Module 2',
  rec:['Record one full session of the jump drill: ten random roots, singing the major third above each, with the reveal played after each attempt so the recording shows right/wrong.'],
  stds:['At least 8 of 10 correct.','Every attempt jumps straight to the note — no walking up do–re–mi.']},
]},
{n:3,t:'A Moving Line',g:'Now the third has to move. In parallel-thirds harmony your line copies the shape of the melody, staying a third above it the whole way. The practice song is Row, Row, Row Your Boat — simple enough that you know it cold, so all your attention goes to staying on your line.',lessons:[
 {id:'3.1',t:'Your Part Is a Song',f:'Learn the harmony line until it stands alone.',time:'~15 min',covers:'The golden rule',tool:'row',
  tasks:['Press “Harmony only” and sing along, over and over.','Keep going until the harmony line stops feeling like “the melody but higher” and becomes a tune you could hum in the shower.','This is the single most important trick in all harmony singing: learn your part until it is a melody to YOU.'],
  stds:['You can sing the full harmony line from memory, with no playback.']},
 {id:'3.2',t:'Against the Melody',f:'Hold your line while the melody plays underneath.',time:'~15 min',covers:'Independence in motion',tool:'row',
  tasks:['Press “Melody only” and sing the harmony line over it. The melody will try to drag you down onto it — this is where Module 1’s stubbornness pays off.','If you collapse onto the melody: stop, play “Harmony only” twice, try again.','Finish with “Both together”, singing along with the harmony voice to confirm you were right.'],
  stds:['A full run against the melody without falling onto it.','Three clean runs in a row.']},
 {id:'3.3',t:'Duet With Yourself',f:'Harmonize over your own recorded voice.',time:'~15 min',covers:'First real duet',tool:'row',
  tasks:['Record yourself singing the MELODY on your phone.','Play it back out loud and sing the harmony line live over your own voice.','Congratulations — you are a duo. Capture the duet if you have a second device or a recording app that plays and records at once.'],
  stds:['You can harmonize live over your own recorded melody, full song.']},
 {id:'cpC',cp:true,t:'Checkpoint — The Duet',f:'A moving harmony line, held start to finish.',covers:'Module 3',
  rec:['Record yourself singing the harmony line against the “Melody only” playback, full song, three takes.'],

/* ===================== AUDIO ENGINE ===================== */
let actx=null,droneOsc=null,droneGain=null;
const TS={root:0,intv:4,key:0,droneOn:false};
function ac(){
 if(!actx){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  /* iOS 17+: route as media playback so the ringer/silent switch does not mute Web Audio */
  if(navigator.audioSession){try{navigator.audioSession.type='playback';}catch(e){}}
 }
 if(actx.state==='suspended')actx.resume();
 return actx;
}
/* iOS unlock: the context only truly starts inside a user gesture — resume it and
   play one silent sample on the first touch/click anywhere. */
function unlockAudio(){
 const a=ac();
 const kick=()=>{try{const b=a.createBuffer(1,1,22050);const s=a.createBufferSource();s.buffer=b;s.connect(a.destination);s.start(0);}catch(e){}};
 if(a.state==='running')kick();else a.resume().then(kick).catch(()=>{});
 document.removeEventListener('touchend',unlockAudio);
 document.removeEventListener('click',unlockAudio);
}
document.addEventListener('touchend',unlockAudio,{passive:true});
document.addEventListener('click',unlockAudio);
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freq(s){return 261.626*Math.pow(2,s/12);}
function nlabel(s){return NN[((s%12)+12)%12]+(4+Math.floor(s/12));}
function tone(s,dur,when,vol){
 const a=ac();
 const go=()=>{const o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=freq(s);const t=a.currentTime+(when||0);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.25,t+0.03);g.gain.setValueAtTime(vol||0.25,t+dur-0.08);g.gain.linearRampToValueAtTime(0,t+dur);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.05);};
 if(a.state==='running')go();else a.resume().then(go).catch(go);
}
function playRoot(){tone(TS.root,1.5,0);}
function playOff(off){tone(TS.root+off,1.5,0);}
function playBoth(off){tone(TS.root,2,0,0.18);tone(TS.root+off,2,0,0.18);}
function stopDrone(){if(droneOsc){const a=ac();droneGain.gain.linearRampToValueAtTime(0,a.currentTime+0.2);droneOsc.stop(a.currentTime+0.25);droneOsc=null;TS.droneOn=false;syncDroneBtns();}}
function toggleDrone(){
 if(droneOsc){stopDrone();return;}
 const a=ac();
 const go=()=>{if(droneOsc)return;droneOsc=a.createOscillator();droneGain=a.createGain();droneOsc.type='triangle';droneOsc.frequency.value=freq(TS.root);droneGain.gain.setValueAtTime(0,a.currentTime);droneGain.gain.linearRampToValueAtTime(0.15,a.currentTime+0.3);droneOsc.connect(droneGain);droneGain.connect(a.destination);droneOsc.start();TS.droneOn=true;syncDroneBtns();};
 if(a.state==='running')go();else a.resume().then(go).catch(go);
}
function syncDroneBtns(){document.querySelectorAll('.droneBtn').forEach(b=>{b.textContent=TS.droneOn?'■ Stop drone':'▶ Start drone';});}
function setRoot(v){TS.root=parseInt(v,10);if(droneOsc)droneOsc.frequency.setValueAtTime(freq(TS.root),ac().currentTime);}
function randRoot(){TS.root=-12+Math.floor(Math.random()*20);document.querySelectorAll('.rootSel').forEach(s=>{s.value=TS.root;});if(droneOsc)droneOsc.frequency.setValueAtTime(freq(TS.root),ac().currentTime);playRoot();}
/* Row Row Row Your Boat — [semitones from C4, beats] */
const MEL=[[0,3],[0,3],[0,2],[2,1],[4,3],[4,2],[2,1],[4,2],[5,1],[7,6],
[12,1],[12,1],[12,1],[7,1],[7,1],[7,1],[4,1],[4,1],[4,1],[0,1],[0,1],[0,1],
[7,2],[5,1],[4,2],[2,1],[0,6]];
const T3={0:4,2:5,4:7,5:9,7:11,12:16};
function playSeq(part,both){const beat=60/180;let t=0.05;MEL.forEach(n=>{const d=n[1]*beat;if(part!=='harm')tone(n[0]+TS.key,d*0.95,t,0.2);if(part==='harm'||both)tone(T3[n[0]]+TS.key,d*0.95,t,part==='harm'?0.2:0.13);t+=d;});}

function rootSelHTML(){let h='<select class="tsel rootSel" onchange="setRoot(this.value)">';for(let s=-12;s<=7;s++)h+='<option value="'+s+'"'+(s===TS.root?' selected':'')+'>'+nlabel(s)+'</option>';return h+'</select>';}
function intSelHTML(){const I=[[4,'Major 3rd (do→mi)'],[3,'Minor 3rd'],[5,'Perfect 4th'],[7,'Perfect 5th (do→so)'],[9,'Major 6th'],[12,'Octave']];let h='<select class="tsel" onchange="TS.intv=parseInt(this.value,10)">';I.forEach(p=>{h+='<option value="'+p[0]+'"'+(p[0]===TS.intv?' selected':'')+'>'+p[1]+'</option>';});return h+'</select>';}
function keySelHTML(){const K=[[0,'Key C'],[-3,'Key A (lower)'],[-5,'Key G (lower)'],[2,'Key D (higher)']];let h='<select class="tsel" onchange="TS.key=parseInt(this.value,10)">';K.forEach(p=>{h+='<option value="'+p[0]+'"'+(p[0]===TS.key?' selected':'')+'>'+p[1]+'</option>';});return h+'</select>';}

  '<div class="t-hint">Pick the key where both lines sit comfortably in your voice.</div></div>';

}

 '<div class="bcard"><div class="bcard-title">The song ladder</div><div class="bcard-sub">module 4 repertoire · in rough order of difficulty</div><div class="road">'+songs.map(r=>'<div class="road-row"><span class="road-tag '+r.c+'">'+r.t+'</span><span class="road-body">'+r.b+'</span></div>').join('')+'</div></div>'+
 '<div class="bcard"><div class="bcard-title">Isolating a harmony part</div><div class="bcard-sub">the module 4 toolbox</div><ul>'+
 '<li>Old records (Everly Brothers era) often pan the two voices left/right — headphones, pull one side out.</li>'+
 '<li>Stem-splitter apps (Moises, LALAL.AI) separate vocals from a track; some split double-tracked vocals too.</li>'+
 '<li>YouTube has “harmony only” / “isolated vocals” videos for most classic duets — search the song title + “harmony”.</li>'+
 '<li>No isolation available? Learn the melody cold first — then the other moving line you hear IS the harmony.</li>'+
 '</ul></div>'+
 '<div class="bcard"><div class="bcard-title">Blend — the other half of harmony</div><div class="bcard-sub">what separates correct from beautiful</div><ul>'+
 '<li>Match vowels: shape your “ooh” and “ah” the way the lead does, not your default way.</li>'+
 '<li>Match phrasing: start and end words exactly together — cutoffs sell the blend.</li>'+
 '<li>Sing harmony slightly softer than the lead; tuck underneath rather than compete.</li>'+
 '<li>Less vibrato than you would use solo — straight tone locks intervals tighter.</li>'+
 '</ul></div>';
}
/* ---- Progress ---- */
function renderProg(){
 const totL=FLAT.length;const doneL=FLAT.filter(isMastered).length;const pct=Math.round(doneL/totL*100);
 const cps=[];MODULES.forEach(m=>m.lessons.forEach(l=>{if(l.cp)cps.push(l);}));
 let h='<div class="mod-head"><div class="mtag">Progress</div><h2>Your Path</h2><p>'+doneL+' of '+totL+' lessons mastered. Each module unlocks the next as you pass its standards — no calendar, only gates.</p><div class="mod-prog"><div class="bar"><i style="width:'+pct+'%"></i></div><span>'+pct+'%</span></div></div>';
 h+='<div class="bcard"><div class="bcard-title">Modules</div><div class="bcard-sub">tap a module tab to open its lessons</div>';
 MODULES.forEach(m=>{const p=moduleProgress(m);const locked=statusOf(m.lessons[0].id)==='locked';h+='<div class="pmod"><div class="pmod-n">M'+m.n+'</div><div class="pmod-t">'+m.t+(locked?' 🔒':'')+'</div><div class="pmod-c">'+p.done+'/'+p.tot+'</div></div>';});
 h+='</div><div class="bcard"><div class="bcard-title">Recording checkpoints</div><div class="bcard-sub">upload these to Claude for review</div>';
 cps.forEach(l=>{const done=isMastered(l.id);const open=statusOf(l.id)!=='locked';h+='<div class="pmod"><div class="pmod-n">'+(done?'✓':(open?'◆':'🔒'))+'</div><div class="pmod-t">'+l.t.replace('Checkpoint — ','')+'</div><div class="pmod-c">'+(done?'passed':(open?'ready':'locked'))+'</div></div>';});
 h+='</div>';
 return h;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doExport(){const blob=new Blob([JSON.stringify({lessons:S,exported:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='harmony-path-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('Backup downloaded');}
function doImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.lessons){S=d.lessons;persist();render();showToast('Progress restored');}}catch(e){showToast('Could not read that file');}};r.readAsText(f);ev.target.value='';}
function doReset(){if(!confirm('Erase all progress and start the path fresh? Export a backup first if unsure.'))return;S={};persist();render();showToast('Progress reset');}
init();
(function(){for(const m of MODULES){if(m.lessons.some(l=>!isMastered(l.id))){view=m.n;break;}}})();
render();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
