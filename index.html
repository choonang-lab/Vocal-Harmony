<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A6B45">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>和声 · Harmony Path</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEDE8;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E5E3DD;--border2:#D0CEC8;
  --text:#1C1B18;--text2:#4A4845;--muted:#8C8A84;--muted2:#B8B6B0;
  --accent:#1A6B45;--accent-bg:#E8F4EE;--amber:#92560A;--amber-bg:#FBF2E6;
  --purple:#6B3FA0;--purple-bg:#F0E8F7;--red:#9B2C2C;--blue:#1D4E89;
  --radius:10px;--radius-sm:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;overflow-x:clip;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:200;}
.site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:calc(env(safe-area-inset-top) + 16px);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1100px;margin:0 auto;}
.logo h1{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;}
.logo h1 span{color:var(--accent);}
.logo p{font-size:0.65rem;color:var(--muted);margin-top:1px;letter-spacing:0.02em;}
.header-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbtn{font-family:inherit;font-size:0.72rem;font-weight:600;padding:7px 12px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.nav{display:flex;width:max-content;min-width:100%;padding:0 10px;max-width:1100px;margin:0 auto;}
.ntab{font-family:inherit;font-weight:700;font-size:0.74rem;padding:11px 13px;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ntab .lock{font-size:0.7rem;opacity:0.5;}
.ntab .mod-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);}
.ntab .mod-dot.done{background:var(--accent);}
.ntab .mod-dot.part{background:var(--amber);}
.wrap{max-width:1100px;margin:0 auto;padding:18px 18px 60px;}
.mod-head{margin-bottom:6px;}
.mod-head .mtag{font-size:0.6rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
.mod-head h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;margin-top:3px;}
.mod-head p{font-size:0.82rem;color:var(--text2);margin-top:6px;line-height:1.5;max-width:680px;}
.mod-prog{display:flex;align-items:center;gap:10px;margin:14px 0 4px;}
.bar{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bar > i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .4s;}
.mod-prog span{font-size:0.66rem;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.lesson{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border2);border-radius:var(--radius);padding:14px 15px;margin-top:10px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative;}
.lesson:hover{box-shadow:var(--shadow);}
.lesson:active{transform:scale(.997);}
.lesson.locked{cursor:not-allowed;opacity:0.6;background:var(--surface2);}
.lesson.mastered{border-left-color:var(--accent);}
.lesson.available{border-left-color:var(--amber);}
.lesson.cp{border-left-color:var(--purple);background:linear-gradient(0deg,var(--purple-bg),var(--surface) 60%);}
.lesson.cp.mastered{border-left-color:var(--accent);}
.l-badge{width:38px;height:38px;min-width:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem;font-family:'JetBrains Mono',monospace;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border2);}
.l-badge.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-badge.available{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.l-badge.cp{background:var(--purple-bg);color:var(--purple);border-color:#C4A8DC;}
.l-badge.cp.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-main{flex:1;min-width:0;}
.l-title{font-size:0.92rem;font-weight:700;line-height:1.3;}
.l-focus{font-size:0.74rem;color:var(--muted);margin-top:3px;line-height:1.45;}
.l-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:0.56rem;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.chip.tempo{background:var(--amber-bg);border-color:#E8C07A;color:var(--amber);}
.chip.covers{background:var(--accent-bg);border-color:#A8C0DC;color:var(--blue);}
.chip.cp{background:var(--purple-bg);border-color:#C4A8DC;color:var(--purple);}
.l-status{font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;align-self:flex-start;white-space:nowrap;}
.l-status.mastered{color:var(--accent);}
.l-status.available{color:var(--amber);}
.l-status.locked{color:var(--muted2);}
.scrim{display:none;position:fixed;inset:0;background:rgba(28,27,24,.45);z-index:899;}
.scrim.open{display:block;}
.detail{display:none;position:fixed;inset:0;z-index:910;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
.detail.open{display:flex;}
.d-close{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.65rem;color:var(--muted);font-weight:700;position:sticky;top:0;z-index:10;letter-spacing:0.05em;text-transform:uppercase;}
.d-close button{border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 14px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:inherit;}
.d-body{padding:24px 20px calc(env(safe-area-inset-bottom) + 40px);max-width:720px;margin:0 auto;width:100%;}
.d-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
.d-focus{font-size:0.95rem;color:var(--text2);margin-top:8px;line-height:1.6;}
.d-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.d-section{margin-top:24px;}
.d-h{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:11px;}
.d-h.cp{color:var(--purple);}
.d-h.std{color:var(--amber);}
.item{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.check{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.check.on{background:var(--accent);border-color:var(--accent);}
.check.on::after{content:'✓';color:#fff;font-size:0.8rem;font-weight:800;}
.check.std.on{background:var(--amber);border-color:var(--amber);}
.item-text{font-size:0.9rem;line-height:1.55;color:var(--text2);flex:1;}
.std .item-text{font-weight:600;color:var(--text);}
.notes{width:100%;border:1.5px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:0.88rem;font-family:inherit;color:var(--text);background:var(--surface2);resize:vertical;min-height:80px;line-height:1.55;-webkit-appearance:none;}
.notes:focus{outline:none;border-color:var(--accent);}
.cp-note{background:var(--purple-bg);border:1px solid #C4A8DC;border-radius:var(--radius);padding:14px 16px;font-size:0.85rem;line-height:1.6;color:var(--text2);}
.cp-note b{color:var(--purple);}
.master-btn{width:100%;margin-top:26px;padding:16px;border-radius:var(--radius);border:none;font-family:inherit;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:0.02em;}
.master-btn.ready{background:var(--accent);color:#fff;}
.master-btn.ready:hover{background:#145535;}
.master-btn.notready{background:var(--surface2);color:var(--muted2);border:1.5px solid var(--border);cursor:not-allowed;}
.master-btn.done{background:var(--accent-bg);color:var(--accent);border:1.5px solid var(--accent);}
.gate-hint{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:10px;}
.unmark{display:block;margin:14px auto 0;background:none;border:none;color:var(--muted);font-size:0.72rem;text-decoration:underline;cursor:pointer;font-family:inherit;}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:14px;box-shadow:var(--shadow-sm);}
.bcard-title{font-size:0.95rem;font-weight:800;color:var(--accent);margin-bottom:3px;}
.bcard-sub{font-size:0.66rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.bcard ul{list-style:none;}
.bcard li{font-size:0.84rem;line-height:1.55;padding:6px 0 6px 20px;position:relative;border-bottom:1px solid var(--border);}
.bcard li:last-child{border-bottom:none;}
.bcard li::before{content:'›';position:absolute;left:2px;top:5px;color:var(--accent);font-weight:800;}
.road{margin-top:6px;}
.road-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.road-row:last-child{border-bottom:none;}
.road-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap;min-width:74px;text-align:center;background:var(--accent-bg);color:var(--accent);}
.road-tag.c{background:var(--purple-bg);color:var(--purple);}
.road-tag.peak{background:#FBEAEA;color:var(--red);}
.road-body{font-size:0.8rem;color:var(--text2);line-height:1.45;}
.road-body b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;}
.pmod{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.pmod:last-child{border-bottom:none;}
.pmod-n{font-size:0.7rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:26px;}
.pmod-t{flex:1;font-size:0.86rem;font-weight:600;}
.pmod-c{font-size:0.66rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 22px;border-radius:24px;font-size:0.82rem;font-weight:700;z-index:999;transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}
.storage-banner{background:var(--amber-bg);color:var(--amber);font-size:0.72rem;padding:8px 16px;text-align:center;font-weight:600;display:none;}
/* ---- audio tool panel ---- */
.tool-panel{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-top:14px;box-shadow:var(--shadow-sm);}
.tool-panel .t-title{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.t-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:6px;}
.t-label{font-size:0.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;min-width:100%;margin-top:6px;}
.tbtn{font-family:inherit;font-size:0.78rem;font-weight:700;padding:9px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;transition:all .15s;}
.tbtn:hover{background:#145535;}
.tbtn.sec{background:var(--surface);color:var(--accent);}
.tbtn.sec:hover{background:var(--accent-bg);}
.tbtn.warn{background:var(--surface);color:var(--amber);border-color:var(--amber);}
.tsel{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:500;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);}
.t-hint{font-size:0.7rem;color:var(--muted);margin-top:9px;line-height:1.5;}
/* ---- live tuner ---- */
.pd{margin-top:11px;padding:11px 12px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);background:var(--surface2);transition:border-color .15s,background .15s;}
.pd.locked{border-style:solid;border-color:var(--accent);background:var(--accent-bg);}
.pd-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pd-read{display:flex;align-items:baseline;gap:7px;font-family:'JetBrains Mono',monospace;}
.pd-note{font-size:1.25rem;font-weight:700;color:var(--text);min-width:42px;}
.pd-cents{font-size:0.72rem;color:var(--muted);}
.pd-lock{margin-left:auto;font-size:0.66rem;font-weight:800;letter-spacing:0.04em;padding:3px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
.pd-lock.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.pd-lock.sharp,.pd-lock.flat{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.pd-meter{position:relative;height:12px;margin-top:10px;border-radius:6px;background:linear-gradient(90deg,#E8C07A22,#E8C07A11 40%,var(--accent-bg) 50%,#E8C07A11 60%,#E8C07A22);border:1px solid var(--border);overflow:hidden;}
.pd-zone{position:absolute;left:calc(50% - 9%);width:18%;top:0;bottom:0;background:rgba(26,107,69,.16);border-left:1px solid var(--accent);border-right:1px solid var(--accent);}
.pd-needle{position:absolute;top:-2px;bottom:-2px;width:3px;left:50%;transform:translateX(-50%);background:var(--text);border-radius:2px;transition:left .07s linear,background .15s;}
.pd.locked .pd-needle{background:var(--accent);}
.pd-msg{display:none;font-size:0.72rem;color:var(--red);font-weight:600;margin-top:9px;line-height:1.45;}
.pd-msg.show{display:block;}
.pd-scoop{display:none;align-items:center;gap:10px;margin-top:9px;padding:7px 9px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);}
.pd-scoop.show{display:flex;}
.pd-scoop.ok{background:var(--accent-bg);border-color:#A8C8B6;}
.pd-scoop.soft{background:#FBF6EC;border-color:#E8D4A8;}
.pd-scoop.warn{background:var(--amber-bg);border-color:#E8C07A;}
.pd-scoop .scoop-v{flex:1;font-size:0.74rem;font-weight:700;line-height:1.3;}
.pd-scoop.ok .scoop-v{color:var(--accent);}
.pd-scoop.soft .scoop-v{color:var(--amber);}
.pd-scoop.warn .scoop-v{color:var(--amber);}
/* ---- in-app recorder ---- */
.rec{margin-top:12px;padding:13px 14px;border:1.5px solid var(--purple);border-radius:var(--radius);background:linear-gradient(0deg,var(--purple-bg),var(--surface) 70%);}
.rec-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.rec-btn{font-family:inherit;font-size:0.82rem;font-weight:800;padding:10px 16px;border-radius:var(--radius-sm);border:none;background:var(--red);color:#fff;cursor:pointer;display:flex;align-items:center;gap:7px;}
.rec-btn.stop{background:var(--text);}
.rec-dot{width:9px;height:9px;border-radius:50%;background:#fff;}
.rec-btn.live .rec-dot{animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1}50%{opacity:.25}}
.rec-time{font-family:'JetBrains Mono',monospace;font-size:0.9rem;font-weight:600;color:var(--text2);}
.rec audio{width:100%;margin-top:11px;height:38px;}
.rec-dl{display:inline-block;margin-top:9px;font-size:0.74rem;font-weight:700;color:var(--purple);text-decoration:underline;cursor:pointer;}
.rec-hint{font-size:0.68rem;color:var(--muted);margin-top:8px;line-height:1.5;}
/* ---- tempo slider + count-in ---- */
.slider-row{display:flex;align-items:center;gap:11px;margin-top:8px;}
.slider-row label{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;min-width:48px;}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:4px;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:600;color:var(--accent);min-width:62px;text-align:right;}
.toggle-chip{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;padding:7px 11px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;user-select:none;}
.toggle-chip.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.toggle-chip .tg{width:14px;height:14px;border-radius:3px;border:2px solid var(--border2);}
.toggle-chip.on .tg{background:var(--accent);border-color:var(--accent);}
/* ---- hold count (8) ---- */
.hold{display:flex;align-items:center;gap:12px;margin-top:8px;}
.hold-meter{flex:1;display:flex;align-items:center;gap:11px;}
.hold-num{font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:700;color:var(--muted);min-width:42px;text-align:center;transition:color .15s;}
.hold-prog{flex:1;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
.hold-prog > i{display:block;height:100%;width:0;background:var(--accent);border-radius:5px;transition:width .25s linear;}
.hold-res{display:none;font-size:0.74rem;font-weight:700;margin-top:9px;padding:7px 10px;border-radius:var(--radius-sm);}
.hold-res.show{display:block;}
.hold-res.ok{background:var(--accent-bg);color:var(--accent);border:1px solid #A8C8B6;}
.hold-res.warn{background:var(--amber-bg);color:var(--amber);border:1px solid #E8C07A;}
/* ---- lesson log / auto-test ---- */
.ll-auto{font-family:'JetBrains Mono',monospace;font-size:0.54rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--purple);background:var(--purple-bg);border:1px solid #C4A8DC;border-radius:3px;padding:1px 5px;margin-left:6px;vertical-align:middle;}
.lesson-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow-sm);}
.ll-prog{font-size:0.82rem;color:var(--text2);margin-bottom:10px;}
.ll-prog b{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700;}
.ll-pass{color:var(--accent);font-weight:800;font-size:0.74rem;}
.ll-empty{font-size:0.76rem;color:var(--muted);line-height:1.5;}
.ll-list{display:flex;flex-direction:column;gap:0;}
.ll-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.ll-row:last-child{border-bottom:none;}
.ll-note{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.84rem;min-width:34px;}
.ll-b{font-family:'JetBrains Mono',monospace;font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.ll-b.ok{background:var(--accent-bg);color:var(--accent);border-color:#A8C8B6;}
.ll-b.soft{background:#FBF6EC;color:var(--amber);border-color:#E8D4A8;}
.ll-b.warn{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.ll-lk{flex:1;font-size:0.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}

{n:1,t:'Hear & Hold a Note',g:'Harmony is mostly the skill of not being pulled onto someone else’s note. Before you sing different notes, you learn to hold your own note rock-steady while hearing something else. Everything later is built on this.',lessons:[
 {id:'1.1',t:'Land the Note',f:'Hit a played pitch instantly — no scooping up to it.',time:'~10 min',covers:'Pitch accuracy',tool:'tone',
  tasks:['Play a note in your comfortable range with the tone player. Sing it on “ooh” and hold for a slow count of 8.','Record yourself on your phone and listen back: did you start under the note and slide up? Most beginners scoop — aim to land dead-on instantly.','Repeat on five different roots, low and high.'],

 {id:'1.2',t:'Hold Against the Drone',f:'Sustain your note while the same note drones underneath.',time:'~10 min',covers:'Stability',tool:'tone',
  tasks:['Start the drone. Sing the same note and hold 8 counts. When you are perfectly in tune the two voices fuse — learn that fused sound.','If you hear a slow “wah-wah-wah” beating, you are slightly off. Nudge your pitch until the beating stops.','Three holds per session, recorded once.'],

  stds:['You hold your note 8 counts against a different droning note.','Three clean holds in a row, confirmed by recording.'],

 {id:'1.4',t:'Steps Away',f:'Move deliberately while the drone stays still.',time:'~10 min',covers:'Controlled movement',tool:'tone',
  tasks:['With the drone on “do”, sing do–re–do slowly. Then do–re–mi–re–do.','Move slowly and deliberately; land each step, do not slide between them.','Finish each pass by locking back into unison with the drone.'],

 {id:'cpA',cp:true,t:'Checkpoint — The Drone Hold',f:'Prove the foundation holds before building on it.',covers:'Module 1',tool:'tone',

{n:2,t:'Find the Third',g:'Roughly 80% of pop and folk harmony is singing a third above or below the melody — the warm sound in every Everly Brothers and Simon & Garfunkel record. A third is “do” up to “mi”. If you can find a third on demand, you can already harmonize simple songs.',lessons:[
 {id:'2.1',t:'Walk Up to It',f:'Find the third by stepping: do–re–mi, hold the mi.',time:'~10 min',covers:'Interval: major 3rd',tool:'interval',
  tasks:['Play a root. Sing do–re–mi up from it and hold the “mi”.','Press “Reveal answer” to check yourself. Then “Both together” to hear the third ringing against the root.','Repeat across ten different roots.'],
  stds:['You can land the third by walking up, from any root in your range.']},
 {id:'2.2',t:'Jump to It',f:'Hear the root, sing the third directly — no walking.',time:'~15 min',covers:'The core skill',tool:'interval',

 {id:'2.4',t:'The Other Intervals',f:'The 5th, the 4th and the 6th — harmony’s supporting cast.',time:'~10 min',covers:'Intervals: 4th, 5th, 6th',tool:'interval',
  tasks:['Same jump game with the perfect 5th — think the first two notes of “Twinkle Twinkle”.','Then the perfect 4th — “Here Comes the Bride” — and the major 6th — the “My Bon-” of “My Bonnie”.','Mix all intervals with random roots once each feels stable.'],
  stds:['7 out of 10 on the 5th.','7 out of 10 on the 4th.','You can sing a minor 3rd when asked (use the selector to compare it with major).']},
 {id:'cpB',cp:true,t:'Checkpoint — Ten Random Thirds',f:'The gate into real harmony singing.',covers:'Module 2',

{n:3,t:'A Moving Line',g:'Now the third has to move. In parallel-thirds harmony your line copies the shape of the melody, staying a third above it the whole way. The practice song is Row, Row, Row Your Boat — simple enough that you know it cold, so all your attention goes to staying on your line.',lessons:[
 {id:'3.1',t:'Your Part Is a Song',f:'Learn the harmony line until it stands alone.',time:'~15 min',covers:'The golden rule',tool:'row',
  tasks:['Press “Harmony only” and sing along, over and over.','Keep going until the harmony line stops feeling like “the melody but higher” and becomes a tune you could hum in the shower.','This is the single most important trick in all harmony singing: learn your part until it is a melody to YOU.'],

 {id:'3.3',t:'Duet With Yourself',f:'Harmonize over your own recorded voice.',time:'~15 min',covers:'First real duet',tool:'row',

 {id:'cpC',cp:true,t:'Checkpoint — The Duet',f:'A moving harmony line, held start to finish.',covers:'Module 3',

{n:4,t:'Real Songs',g:'Now you steal from the masters. Each lesson applies the same four-step method to a real recording: isolate the harmony part, learn it as a melody, reattach it to the track, record and review. The song ladder in Reference orders them by difficulty.',lessons:[
 {id:'4.1',t:'The Everly Method — Song One',f:'“All I Have to Do Is Dream” — pure parallel thirds, the textbook starter.',time:'2–3 sessions',covers:'Isolate · learn · reattach · record',
  tasks:['ISOLATE: find the harmony part. On many old records the voices are panned left/right — use headphones and pull one side, or use a stem-splitting app (Moises, LALAL.AI), or search YouTube for a “harmony only” video.','LEARN: sing the harmony part alone, with the lyric, until it stands on its own — the Module 3 trick.','REATTACH: sing your part against the full recording. Quietly at first; listen more than you sing.','RECORD: one take over the track. Mark the spots where you drifted to the melody and drill just those lines.'],

 {id:'4.2',t:'Song Two',f:'Pick one: “Bye Bye Love” (faster thirds), “Jackson” (call-and-response), or “The Sound of Silence” (slow and forgiving).',time:'2–3 sessions',covers:'Same method, new song',
  tasks:['Run the same four steps: isolate, learn, reattach, record.','This time, also match the lead voice’s vowels and phrasing — blend is half of harmony. End words together; shape “ooh” the same way they do.'],

 {id:'4.3',t:'Song Three — Step Up',f:'Pick one: “If I Fell” (lines go independent in spots) or “Emmylou” (sustained close harmony).',time:'3+ sessions',covers:'Independent lines',

 {id:'cpD',cp:true,t:'Checkpoint — Three Songs',f:'Your first repertoire.',covers:'Module 4',
  rec:['Record (or collect) your best take of each of the three songs — you singing harmony over the original track.'],

{n:5,t:'Invent Your Own',g:'The skill people mean by “she can just harmonize with anything”. It is not magic — it is the Module 2 reflex (find the third) plus one new idea: when the parallel third sounds wrong, hold your note still until it sounds right again. Your ear, trained by Modules 1–4, tells you which to do.',lessons:[
 {id:'5.1',t:'Harmonize the Radio',f:'Improvise thirds over choruses of songs you know well.',time:'~15 min',covers:'Improvisation',
  tasks:['Put on simple, familiar songs and quietly sing thirds above the chorus. Choruses repeat, so you get many tries.','When a note clashes: hold your previous note instead of moving, or try a 4th or 5th. Listen for the Module 2 “lock” to tell you when you have found it.','Different song every session.'],

 {id:'5.2',t:'Below the Melody',f:'The same reflex, inverted — often easier for lower voices.',time:'~15 min',covers:'Low harmony',

 {id:'cpFinal',cp:true,t:'Checkpoint — Free Harmony',f:'The finish line: harmony nobody wrote down for you.',covers:'The whole path',

/* ===================== AUDIO ENGINE ===================== */
let actx=null,droneNodes=[],sessionMode='playback',actxMode='playback';
const TS={root:0,intv:4,key:0,droneOn:false,drone5:false,bpm:96,countin:true};
function setAudioSession(mode){
 /* iOS WebKit AudioSession. 'playback' is output-only and is INCOMPATIBLE with
    mic capture; 'play-and-record' allows both. We remember the requested mode so a
    freshly created AudioContext adopts it. */
 sessionMode=mode;
 if(navigator.audioSession){try{navigator.audioSession.type=mode;}catch(e){}}
}
function ac(){
 if(!actx){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  actxMode=sessionMode;
  if(navigator.audioSession){try{navigator.audioSession.type=sessionMode;}catch(e){}}
 }
 if(actx.state==='suspended')actx.resume();
 return actx;
}
/* iOS will not switch a live AudioContext between output-only ('playback') and
   capture ('play-and-record'), and stopping the mic can leave a play-and-record
   context unable to play. So we rebuild the context on each transition, restarting
   the drone if it was on. Transitions are serialized on a promise chain to avoid
   close/create races. */
let acChain=Promise.resolve();
function rebuildContext(mode){
 const wasDrone=TS.droneOn;
 return (actx?actx.close().catch(()=>{}):Promise.resolve()).then(()=>{
  actx=null;droneNodes=[];TS.droneOn=false;pdSource=null;pdAnalyser=null;pdSink=null;
  setAudioSession(mode);ac();syncDroneBtns();
  if(wasDrone)toggleDrone();
 });
}
function enterCaptureMode(){
 acChain=acChain.then(()=>{
  setAudioSession('play-and-record');
  if(actx && actxMode!=='play-and-record')return rebuildContext('play-and-record');
  ac();
 });
 return acChain;
}
function exitCaptureMode(){
 acChain=acChain.then(()=>{
  if(pdActive||(mediaRec&&mediaRec.state==='recording'))return; // capture resumed
  setAudioSession('playback');
  if(actx && actxMode!=='playback')return rebuildContext('playback');
 });
 return acChain;
}
/* iOS unlock: the context only truly starts inside a user gesture — resume it and
   play one silent sample on the first touch/click anywhere. */
function unlockAudio(){
 const a=ac();
 const kick=()=>{try{const b=a.createBuffer(1,1,22050);const s=a.createBufferSource();s.buffer=b;s.connect(a.destination);s.start(0);}catch(e){}};
 if(a.state==='running')kick();else a.resume().then(kick).catch(()=>{});
 document.removeEventListener('touchend',unlockAudio);
 document.removeEventListener('click',unlockAudio);
}
document.addEventListener('touchend',unlockAudio,{passive:true});
document.addEventListener('click',unlockAudio);
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freq(s){return 261.626*Math.pow(2,s/12);}
function nlabel(s){return NN[((s%12)+12)%12]+(4+Math.floor(s/12));}
function tone(s,dur,when,vol){
 const a=ac();
 const go=()=>{const o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=freq(s);const t=a.currentTime+(when||0);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.25,t+0.03);g.gain.setValueAtTime(vol||0.25,t+dur-0.08);g.gain.linearRampToValueAtTime(0,t+dur);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.05);};
 if(a.state==='running')go();else a.resume().then(go).catch(go);
}
/* a single percussive metronome click, optionally scheduled ahead */
function metroClick(accent,when){
 const a=ac();const t=a.currentTime+(when||0);
 const o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=accent?1760:1200;
 g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(accent?0.3:0.2,t+0.004);g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
 o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.09);
}
function playRoot(){setTarget(TS.root);tone(TS.root,1.5,0);}
function playOff(off){setTarget(TS.root+off);tone(TS.root+off,1.5,0);rangeNudge(off);}
function rangeNudge(off){const p=profile();if(!p)return;const tgt=TS.root+off+60;if(tgt>p.high+2)showToast('That note sits above your tested range — try a lower root');else if(tgt<p.low-2)showToast('That note sits below your tested range — try a higher root');}
function playBoth(off){setTarget(TS.root+off);tone(TS.root,2,0,0.18);tone(TS.root+off,2,0,0.18);}
function stopDrone(){if(droneNodes.length){const a=ac();droneNodes.forEach(n=>{try{n.gain.gain.linearRampToValueAtTime(0,a.currentTime+0.2);n.osc.stop(a.currentTime+0.25);}catch(e){}});droneNodes=[];TS.droneOn=false;syncDroneBtns();}}
function addDrone(off,type,vol){const a=ac();const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=freq(TS.root+off);g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(vol,a.currentTime+0.3);o.connect(g);g.connect(a.destination);o.start();droneNodes.push({osc:o,gain:g,off:off});}
function toggleDrone(){
 if(droneNodes.length){stopDrone();return;}
 const a=ac();
 const go=()=>{if(droneNodes.length)return;setTarget(TS.root);addDrone(0,'triangle',0.13);addDrone(-12,'sine',0.11);if(TS.drone5)addDrone(7,'sine',0.05);TS.droneOn=true;syncDroneBtns();};
 if(a.state==='running')go();else a.resume().then(go).catch(go);
}
function toggleDrone5(el){TS.drone5=!TS.drone5;if(el)el.classList.toggle('on',TS.drone5);if(droneNodes.length){stopDrone();toggleDrone();}}
function syncDroneBtns(){document.querySelectorAll('.droneBtn').forEach(b=>{b.textContent=TS.droneOn?'■ Stop drone':'▶ Start drone';});}
function reTuneDrone(){if(droneNodes.length){const a=ac();droneNodes.forEach(n=>n.osc.frequency.setValueAtTime(freq(TS.root+n.off),a.currentTime));}}
function setRoot(v){TS.root=parseInt(v,10);setTarget(TS.root);reTuneDrone();}
function randRoot(){TS.root=-12+Math.floor(Math.random()*20);document.querySelectorAll('.rootSel').forEach(s=>{s.value=TS.root;});reTuneDrone();playRoot();}
/* Row Row Row Your Boat — [semitones from C4, beats] */
const MEL=[[0,3],[0,3],[0,2],[2,1],[4,3],[4,2],[2,1],[4,2],[5,1],[7,6],
[12,1],[12,1],[12,1],[7,1],[7,1],[7,1],[4,1],[4,1],[4,1],[0,1],[0,1],[0,1],
[7,2],[5,1],[4,2],[2,1],[0,6]];
const T3={0:4,2:5,4:7,5:9,7:11,12:16};

function autoCorrelate(buf,sr,minClarity){

    just as well at twice the true period, which is what made it read an octave low. */
 const thr=0.86*bestv;let pk=best;
 for(let k=1;k<n-1;k++){if(corr[k]>=thr&&corr[k]>corr[k-1]&&corr[k]>=corr[k+1]){pk=k;break;}}

 const ym=pk>0?corr[pk-1]:corr[pk],y0=corr[pk],yp=pk<n-1?corr[pk+1]:corr[pk];

function setMetroBpm(v){metroBpm=parseInt(v,10);const el=document.getElementById('metVal');if(el)el.textContent=metroBpm+' bpm';if(metroTimer){stopMetro();toggleMetro();}}
function metroFlash(accent){const d=document.getElementById('metDot');if(!d)return;d.classList.add('beat');if(accent)d.classList.add('accent');d.textContent=(metroBeat%4)+1;setTimeout(()=>{d.classList.remove('beat','accent');},90);}
function toggleMetro(){
 if(metroTimer){stopMetro();return;}
 ac();metroBeat=0;
 const tick=()=>{const acc=metroBeat%4===0;metroClick(acc,0);metroFlash(acc);metroBeat++;};
 tick();metroTimer=setInterval(tick,60000/metroBpm);
 const b=document.getElementById('metBtn');if(b)b.textContent='■ Stop';
}
function stopMetro(){if(metroTimer){clearInterval(metroTimer);metroTimer=null;}const b=document.getElementById('metBtn');if(b)b.textContent='▶ Start';const d=document.getElementById('metDot');if(d){d.classList.remove('beat','accent');d.textContent='♩';}}
function metroHTML(){
 return '<div class="tool-panel"><div class="t-title">♪ Metronome</div>'+
 '<div class="t-row" style="align-items:center"><div class="metro-dot" id="metDot">♩</div><button class="tbtn" id="metBtn" onclick="toggleMetro()">▶ Start</button></div>'+
 '<div class="slider-row"><label>Tempo</label><input type="range" min="40" max="200" value="'+metroBpm+'" oninput="setMetroBpm(this.value)"><span class="slider-val" id="metVal">'+metroBpm+' bpm</span></div>'+
 '<div class="t-hint">A steady pulse for the Row drill and any song work — accented click on beat 1 of every 4.</div></div>';
}
/* ===================== HOLD COUNT (slow count of 8) =====================
   Auto-start: when the tuner is on with a target inside a hold-scored lesson,
   a sustained, near-target note starts the 8-count by itself; a long silence
   mid-count resets it (no score), and 8 counts auto-records pass/fail. A manual
   button and an "Auto-start" toggle remain. */
let holdTimer=null,holdCount=0,holdLocked=0;
let holdAuto=true,holdArmed=true,holdOnset=0,holdSil=0,holdDoneAt=0,holdHintTxt='';
function syncHoldBtns(){document.querySelectorAll('.hold-btn').forEach(b=>{b.textContent=holdTimer?'■ Stop count':'▶ Hold count (8)';});}
function setHoldNum(n,ok){document.querySelectorAll('.hold-num').forEach(e=>{e.textContent=n;e.style.color=ok===true?'var(--accent)':(ok===false?'var(--amber)':'');});}
function setHoldBar(pct){document.querySelectorAll('.hold-bar').forEach(e=>{e.style.width=pct+'%';});}
function setHoldRes(txt,ok){document.querySelectorAll('.hold-res').forEach(e=>{e.textContent=txt||'';e.className='hold-res'+(txt?(' show '+(ok?'ok':'warn')):'');});}
function setHoldHint(txt,ok){if(holdHintTxt===txt)return;holdHintTxt=txt;setHoldRes(txt,ok);}
function resetAutoHold(){holdArmed=true;holdOnset=0;holdSil=0;holdDoneAt=0;holdHintTxt='';}
function toggleHoldAuto(el){holdAuto=!holdAuto;if(el)el.classList.toggle('on',holdAuto);holdOnset=0;holdHintTxt='';if(!holdTimer)setHoldRes('');}
function canAutoHold(){return holdAuto&&pdActive&&pdTargetHz>0&&inAutoLesson()&&!!holdCheck(lessonById(curId));}
function stopHold(){if(holdTimer){clearInterval(holdTimer);holdTimer=null;}holdCount=0;setHoldNum(8,null);setHoldBar(0);setHoldRes('');holdHintTxt='';holdDoneAt=Date.now();syncHoldBtns();}
function abortHold(){if(!holdTimer)return;clearInterval(holdTimer);holdTimer=null;holdCount=0;setHoldNum(8,null);setHoldBar(0);holdDoneAt=Date.now();holdHintTxt='';setHoldRes('Count reset — sing and hold the note',false);syncHoldBtns();}
function toggleHold(){if(holdTimer){stopHold();return;}startHold();}
function startHold(){
 if(holdTimer)return;
 ac();holdCount=0;holdLocked=0;holdScoopCls=null;holdHintTxt='';setHoldRes('');
 const tracking=pdActive&&pdTargetHz>0;          // tuner on + a target note → tally lock
 const step=()=>{
  holdCount++;
  metroClick(holdCount===1,0);
  if(tracking&&pdLocked)holdLocked++;
  setHoldNum(holdCount,tracking?!!pdLocked:null);
  setHoldBar(Math.round(holdCount/8*100));
  if(holdCount>=8){
   clearInterval(holdTimer);holdTimer=null;holdDoneAt=Date.now();
   if(tracking)setHoldRes(holdLocked>=7?('✓ Held in tune — '+holdLocked+'/8 counts locked'):('In tune '+holdLocked+'/8 counts — hold steadier next time'),holdLocked>=7);
   else setHoldRes('✓ Eight counts complete',true);
   syncHoldBtns();recordHold(tracking);
  }
 };
 step();                                          // count 1 immediately
 holdTimer=setInterval(step,1000);                // ~1s per count — a slow eight
 syncHoldBtns();
}
/* Per-frame auto-hold watcher, driven by the pitch loop. */
function updateAutoHold(voiced,cents){
 if(voiced)holdSil=0;else holdSil++;
 if(holdTimer){if(holdSil>=36)abortHold();return;}      // ~1.2s silence mid-count → reset, no score
 if(!holdArmed){
  if(holdSil>=8&&Date.now()-holdDoneAt>1600)holdArmed=true;  // require a breath of silence (and let a result linger) before re-arming
  else return;
 }
 if(!canAutoHold()){holdOnset=0;return;}
 setHoldHint('Listening — sing and hold the note…',true);
 const near=voiced&&cents!==null&&Math.abs(cents)<110;
 if(near)holdOnset++;else holdOnset=0;
 if(holdOnset>=12){holdOnset=0;holdArmed=false;startHold();}  // ~0.4s sustained near the target → go
}
/* ===================== M0 · VOICE RANGE (calibration) =====================
   A skippable setup that captures lowest/highest comfortable notes, derives an
   (overridable) voice type, and sets a comfortable default drone root. Reuses the
   live pitch engine; runs only on the setup view. */
let rangeArmed=null,rangeBuf=[],rangeDevB=[],rangeGap=0,profileDraft={low:null,high:null},voiceOverride=null;
function profile(){return S.__profile||null;}
function rangeMidiName(midi){return NN[((midi%12)+12)%12]+(Math.floor(midi/12)-1);}
function voiceType(m){if(m<50)return 'Bass';if(m<55)return 'Baritone';if(m<59)return 'Tenor';if(m<63)return 'Alto';if(m<67)return 'Mezzo-soprano';return 'Soprano';}
function recoRootMidi(){const p=profileDraft;if(p.low==null||p.high==null)return 60;const center=(p.low+p.high)/2;return Math.round(Math.max(p.low+2,Math.min(p.high-7,center-2)));}
function setRangeMsg(t,ok){const e=document.getElementById('rangeMsg');if(e){e.textContent=t||'';e.style.color=t?(ok?'var(--accent)':'var(--amber,#c70)'):'';}}
function paintRangeVals(){
 const p=profileDraft;
 const lo=document.getElementById('rngLow');if(lo)lo.textContent=p.low!=null?rangeMidiName(p.low):'—';
 const hi=document.getElementById('rngHigh');if(hi)hi.textContent=p.high!=null?rangeMidiName(p.high):'—';
 const rr=document.getElementById('rngRoot');if(rr)rr.textContent=(p.low!=null&&p.high!=null)?rangeMidiName(recoRootMidi()):'—';
 const vt=document.getElementById('rngVoice');if(vt&&!voiceOverride&&p.low!=null&&p.high!=null)vt.value=voiceType((p.low+p.high)/2);
}
function armRange(which){
 if(!pdActive){showToast('Turn on the tuner first');return;}
 rangeArmed=which;rangeBuf=[];rangeDevB=[];rangeGap=0;
 setRangeMsg('Sing your '+(which==='low'?'lowest':'highest')+' comfortable note and hold it…',true);
}
function finalizeRange(){
 const m=Math.round(medOf(rangeBuf)),which=rangeArmed;
 rangeArmed=null;rangeBuf=[];rangeDevB=[];rangeGap=0;
 profileDraft[which]=m;
 if(profileDraft.low!=null&&profileDraft.high!=null&&profileDraft.low>profileDraft.high){const a=profileDraft.low;profileDraft.low=profileDraft.high;profileDraft.high=a;}
 setRangeMsg('Captured '+(which==='low'?'lowest':'highest')+': '+rangeMidiName(m)+' ✓',true);
 paintRangeVals();
}
function feedRange(hz,voiced){
 if(view!=='setup'||!rangeArmed)return;
 if(voiced&&hz>0){
  rangeGap=0;
  const midiF=69+12*Math.log2(hz/440);
  if(midiF<28||midiF>96)return;
  if(!rangeBuf.length){rangeBuf=[midiF];rangeDevB=[];setRangeMsg('Hearing '+rangeMidiName(Math.round(midiF))+'… keep holding',true);return;}
  if(Math.abs(midiF-medOf(rangeBuf))<=0.7){
   rangeBuf.push(midiF);if(rangeBuf.length>60)rangeBuf.shift();rangeDevB=[];
   if(rangeBuf.length%6===0)setRangeMsg('Hearing '+rangeMidiName(Math.round(medOf(rangeBuf)))+'… keep holding',true);
   if(rangeBuf.length>=28)finalizeRange();
  }else{rangeDevB.push(midiF);if(rangeDevB.length>=3){rangeBuf=rangeDevB.slice();rangeDevB=[];}}
 }else{rangeGap++;rangeDevB=[];if(rangeGap>=22){rangeBuf=[];}}
}
function setVoiceOverride(v){voiceOverride=v;}
function saveProfile(){
 const p=profileDraft;
 if(p.low==null||p.high==null){showToast('Capture your lowest and highest notes first');return;}
 const rootOff=Math.max(-17,Math.min(9,recoRootMidi()-60));
 const voice=voiceOverride||voiceType((p.low+p.high)/2);
 S.__profile={low:p.low,high:p.high,voice:voice,root:rootOff,ts:Date.now()};
 TS.root=rootOff;persist();stopPitch();
 showToast('Voice profile saved — drone set to '+nlabel(rootOff));
 view=1;render();window.scrollTo({top:0});
}
function rerunSetup(){profileDraft={low:null,high:null};voiceOverride=null;setRangeMsg('');render();}
function skipSetup(){stopPitch();view=1;render();window.scrollTo({top:0});}
function renderSetup(){
 const pr=profile();
 if(pr&&profileDraft.low==null&&profileDraft.high==null){profileDraft.low=pr.low;profileDraft.high=pr.high;if(pr.voice)voiceOverride=pr.voice;}
 const haveBoth=profileDraft.low!=null&&profileDraft.high!=null;
 const curVoice=haveBoth?(voiceOverride||voiceType((profileDraft.low+profileDraft.high)/2)):'';
 const card=(id,label,val,which)=>'<div style="flex:1;border:1px solid var(--border2,#e3e0d8);border-radius:12px;padding:14px;text-align:center"><div style="font-size:12px;opacity:.7;margin-bottom:6px">'+label+'</div><div id="'+id+'" style="font:700 24px/1 ui-monospace,SFMono-Regular,Menlo,monospace;margin-bottom:12px">'+val+'</div><button class="tbtn sec" onclick="armRange(\''+which+'\')">🎤 Capture</button></div>';
 let h='<div class="mod-head"><div class="mtag">Module 0</div><h2>Find Your Range</h2><p>A one-minute voice check so the drone and the exercises sit where you can actually sing them. Optional, and you can redo it any time from this tab.</p></div>';
 h+='<div class="tool-panel"><div class="t-title">♪ Voice range check</div>'+tunerHTML('tuner_setup');
 h+='<div style="display:flex;gap:10px;margin:12px 0">'+card('rngLow','Lowest comfortable note',haveBoth||profileDraft.low!=null?(profileDraft.low!=null?rangeMidiName(profileDraft.low):'—'):'—','low')+card('rngHigh','Highest comfortable note',profileDraft.high!=null?rangeMidiName(profileDraft.high):'—','high')+'</div>';
 h+='<div id="rangeMsg" style="min-height:18px;font-size:13px;text-align:center;margin:4px 0;font-weight:600"></div>';
 h+='<div class="t-hint">Turn on the tuner, tap a Capture button, then sing that note on “ooh” and hold it steady for about a second. Don’t strain — “comfortable” means a note you can sing relaxed and in full voice. Use headphones.</div></div>';
 h+='<div class="tool-panel"><div class="t-title">Your calibration</div>';
 h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2,#eee)"><span>Estimated voice type</span><select class="tsel" id="rngVoice" onchange="setVoiceOverride(this.value)">'+['Bass','Baritone','Tenor','Alto','Mezzo-soprano','Soprano'].map(v=>'<option'+(v===curVoice?' selected':'')+'>'+v+'</option>').join('')+'</select></div>';
 h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0"><span>Recommended drone root</span><b id="rngRoot">'+(haveBoth?rangeMidiName(recoRootMidi()):'—')+'</b></div>';
 h+='<div class="t-hint">The recommended root centres the exercises in your range and keeps do·re·mi within reach. The voice type is an estimate from your tested notes — change it if you know better. You can still change the root inside any lesson.</div>';
 h+='<div class="t-row" style="margin-top:6px"><button class="tbtn" onclick="saveProfile()">✓ Save &amp; use</button><button class="tbtn sec" onclick="rerunSetup()">↻ Start over</button><button class="tbtn sec" onclick="skipSetup()">Skip for now</button></div></div>';
 return h;
}
/* ===================== LESSON LOG / AUTO PASS ===================== */
function autoChecks(l){return l&&l.auto?(l.auto.checks||[]):[];}
function holdCheck(l){return autoChecks(l).find(c=>c.kind==='hold8');}
function driftCheck(l){return autoChecks(l).find(c=>c.kind==='driftReturn');}
function holdPasses(s){return (s.attempts||[]).filter(a=>a.pass).length;}
function holdScore(c,s){const att=s.attempts||[];if(c&&c.consecutive){let k=0;for(let i=att.length-1;i>=0;i--){if(att[i].pass)k++;else break;}return k;}return att.filter(a=>a.pass).length;}
function checkMet(c,s){if(c.kind==='hold8')return holdScore(c,s)>=(c.need||3);if(c.kind==='driftReturn')return (s.drReps||0)>=(c.need||2);if(c.kind==='stepSeq'){const reps=(s.steps&&s.steps.reps)||[];const n=reps.filter(r=>r.shape&&(c.require==='lock'?r.lock:r.inTune)).length;return n>=(c.need||2);}return false;}
function evaluateAuto(l,s){autoChecks(l).forEach(c=>{if(checkMet(c,s))(c.stds||[]).forEach(i=>{s.stds[i]=true;});});}
function inAutoLesson(){const det=document.getElementById('detail');return curId&&det&&det.classList.contains('open')&&lessonById(curId)&&lessonById(curId).auto;}
function recordHold(tracking){
 if(!inAutoLesson())return;
 const l=lessonById(curId),c=holdCheck(l);if(!c)return;
 const cls=holdScoopCls||((Date.now()-lastScoopAt<10000)?lastScoopCls:null);
 const clean=cls==='ok';const needClean=c.requireClean!==false;
 const note=pdTargetHz>0?hzToNote(pdTargetHz).name:nlabel(TS.root);
 const pass=tracking&&(!needClean||clean)&&holdLocked>=(c.minLock||7);
 const s=st(curId);if(!s.attempts)s.attempts=[];
 s.attempts.push({t:Date.now(),note:note,scoop:cls||'na',locked:tracking?holdLocked:-1,pass:pass,nc:needClean});
 if(s.attempts.length>24)s.attempts.shift();
 if(!s.mastered)evaluateAuto(l,s);
 persist();paintLessonLog();
}
function recordDrift(){
 if(!inAutoLesson())return;
 const l=lessonById(curId),c=driftCheck(l);if(!c)return;
 const s=st(curId);s.drReps=(s.drReps||0)+1;
 if(!s.mastered)evaluateAuto(l,s);
 persist();paintLessonLog();
 showToast('Drift & return '+Math.min(s.drReps,c.need||2)+'/'+(c.need||2)+' ✓');
}
function paintLessonLog(){
 const box=document.getElementById('lessonLog');if(!box||!curId)return;
 const l=lessonById(curId),s=st(curId);if(!l||!l.auto)return;
 let h='';const hc=holdCheck(l),dc=driftCheck(l);
 if(hc){
  const att=s.attempts||[],need=hc.need||3,passes=holdScore(hc,s);
  h+='<div class="ll-prog">'+(hc.consecutive?'Clean holds in a row':(hc.requireClean===false?'Clean unison holds':'Clean in-tune holds'))+' <b>'+Math.min(passes,need)+' / '+need+'</b>'+(passes>=need?' <span class="ll-pass">passed ✓</span>':'')+'</div>';
  if(!att.length)h+='<div class="ll-empty">Play or drone a note, switch on the live tuner, then run the 8-count hold — each one is scored here automatically.</div>';
  else h+='<div class="ll-list">'+att.slice(-6).reverse().map(a=>{
   const b=a.nc===false?'':(a.scoop==='ok'?'<span class="ll-b ok">clean</span>':a.scoop==='soft'?'<span class="ll-b soft">slight</span>':a.scoop==='warn'?'<span class="ll-b warn">scoop</span>':'<span class="ll-b">no onset</span>');
   const lk=a.locked<0?'tuner off':a.locked+'/8 in tune';
   return '<div class="ll-row"><span class="ll-note">'+a.note+'</span>'+b+'<span class="ll-lk">'+lk+'</span><span class="ll-res '+(a.pass?'p':'f')+'">'+(a.pass?'✓':'·')+'</span></div>';
  }).join('')+'</div>';
 }
 if(dc){
  const reps=s.drReps||0,need=dc.need||2;
  h+='<div class="ll-prog" style="margin-top:14px">Deliberate drift &amp; return <b>'+Math.min(reps,need)+' / '+need+'</b>'+(reps>=need?' <span class="ll-pass">passed ✓</span>':'')+'</div>';
  h+='<div class="ll-empty">With the tuner LOCKED, slide off the note by more than ~50¢, hold there a moment, then glide back into the lock <b>without stopping</b>. Each clean round-trip counts.</div>';
 }
 const sc=stepCheck(l);
 if(sc){
  const reps=(s.steps&&s.steps.reps)||[],need=sc.need||2;
  const nIn=reps.filter(r=>r.shape&&r.inTune).length,nLk=reps.filter(r=>r.shape&&r.lock).length;
  h+='<div class="ll-prog" style="margin-top:14px">Steps in tune, up &amp; down <b>'+Math.min(nIn,need)+' / '+need+'</b>'+(nIn>=need?' <span class="ll-pass">passed ✓</span>':'')+'</div>';
  h+='<div class="ll-prog">Return to unison locks <b>'+Math.min(nLk,need)+' / '+need+'</b>'+(nLk>=need?' <span class="ll-pass">passed ✓</span>':'')+'</div>';
  if(!reps.length)h+='<div class="ll-empty">Drone the root, switch on the tuner, then run the Step drill — sing do·re·mi·re·do. Each run is scored here automatically.</div>';
  else h+='<div class="ll-list">'+reps.slice(-6).reverse().map(r=>{const seq=r.degs.map(degName).join(' ');const tin=r.shape&&r.inTune,tlk=r.shape&&r.lock;return '<div class="ll-row"><span class="ll-note" style="min-width:96px">'+(seq||'—')+'</span>'+(tin?'<span class="ll-b ok">in tune</span>':'<span class="ll-b warn">'+(r.shape?'off':'shape')+'</span>')+(tlk?'<span class="ll-b ok">lock</span>':'<span class="ll-b">no lock</span>')+'<span class="ll-res '+((tin&&tlk)?'p':'f')+'">'+((tin&&tlk)?'✓':'·')+'</span></div>';}).join('')+'</div>';
 }
 const allTicked=l.stds.every((_,i)=>s.stds[i]);
 if(s.mastered)h+='<div class="ll-final ok">✓ Mastered by live test</div>';
 else if(allTicked)h+='<button class="master-btn ready" style="margin-top:14px" onclick="autoFinalize()">✓ Live test passed — Mark mastered</button>';
 else if(autoChecks(l).some(c=>checkMet(c,s)))h+='<div class="ll-final ok">✓ Part of the live test passed — finish the other test above to unlock mastery</div>';
 box.innerHTML=h;
}
function autoFinalize(){
 const s=st(curId),l=lessonById(curId);if(!l)return;
 l.stds.forEach((_,i)=>s.stds[i]=true);
 if(l.cp)s.recorded=true;                       // the live test is the verification
 s.mastered=true;markDayActive();persist();
 showToast((l.cp?'Checkpoint':'Lesson '+curId)+' passed by live test — next unlocked');
 openLesson(curId);
}
/* ===================== STREAK / META ===================== */
function meta(){if(!S.__meta)S.__meta={streak:0,best:0,last:'',quick:0};return S.__meta;}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function yestStr(){const d=new Date(Date.now()-86400000);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function markDayActive(){const M=meta();const t=todayStr();if(M.last===t)return;M.streak=(M.last===yestStr())?(M.streak+1):1;M.last=t;if(M.streak>(M.best||0))M.best=M.streak;persist();}
/* ===================== QUICK DRILL ===================== */

 h+='<div class="d-section"><div class="qd-sub">Current root</div><div class="qd-big" id="qdRoot">'+nlabel(TS.root)+'</div>';
 h+='<div class="t-row" style="justify-content:center"><button class="tbtn sec" onclick="qdNew()">↻ New random root</button><button class="tbtn" onclick="playRoot()">1 · Play root</button></div>';
 h+='<div class="t-row" style="justify-content:center"><button class="tbtn sec" onclick="setTarget(TS.root+TS.intv);playOff(TS.intv)">3 · Reveal the third</button><button class="tbtn sec" onclick="playBoth(TS.intv)">Both together</button></div>';
 h+='<div class="t-hint" style="text-align:center">Step 2 is you — sing the third before you reveal.</div>';
 h+=tunerHTML('tuner_quick')+'</div>';
 h+='<div class="d-section"><div class="d-h">Score this session — out of 10 random roots</div><div class="score-row"><button class="score-btn" onclick="qdAdj(-1)">−</button><span class="score-val" id="qdScore">5 / 10</span><button class="score-btn" onclick="qdAdj(1)">+</button></div></div>';

function qdNew(){TS.root=-9+Math.floor(Math.random()*14);setTarget(TS.root+TS.intv);const el=document.getElementById('qdRoot');if(el)el.textContent=nlabel(TS.root);playRoot();}
function qdAdj(d){qdScore=Math.max(0,Math.min(10,qdScore+d));const el=document.getElementById('qdScore');if(el)el.textContent=qdScore+' / 10';}
function logQuick(){markDayActive();const M=meta();M.quick=(M.quick||0)+1;persist();stopPitch();showToast('Logged — streak '+M.streak+' day'+(M.streak===1?'':'s'));closeDetail();}
/* ---- tool panels ---- */
function rootSelHTML(){let h='<select class="tsel rootSel" onchange="setRoot(this.value)">';for(let s=-17;s<=9;s++)h+='<option value="'+s+'"'+(s===TS.root?' selected':'')+'>'+nlabel(s)+'</option>';return h+'</select>';}
function intSelHTML(){const I=[[4,'Major 3rd (do→mi)'],[3,'Minor 3rd'],[5,'Perfect 4th'],[7,'Perfect 5th (do→so)'],[9,'Major 6th'],[12,'Octave']];let h='<select class="tsel" onchange="TS.intv=parseInt(this.value,10)">';I.forEach(p=>{h+='<option value="'+p[0]+'"'+(p[0]===TS.intv?' selected':'')+'>'+p[1]+'</option>';});return h+'</select>';}
function keySelHTML(){const K=[[0,'Key C'],[-3,'Key A (lower)'],[-5,'Key G (lower)'],[2,'Key D (higher)']];let h='<select class="tsel" onchange="TS.key=parseInt(this.value,10)">';K.forEach(p=>{h+='<option value="'+p[0]+'"'+(p[0]===TS.key?' selected':'')+'>'+p[1]+'</option>';});return h+'</select>';}
function toolHTML(type){
 if(type==='tone')return '<div class="tool-panel"><div class="t-title">♪ Tone &amp; Drone</div>'+
  '<div class="t-row">'+rootSelHTML()+'<button class="tbtn" onclick="playRoot()">▶ Play note</button><button class="tbtn sec droneBtn" onclick="toggleDrone()">'+(TS.droneOn?'■ Stop drone':'▶ Start drone')+'</button><span class="toggle-chip'+(TS.drone5?' on':'')+'" onclick="toggleDrone5(this)"><span class="tg"></span>+5th</span></div>'+
  '<div class="t-label">Second note, over the drone</div><div class="t-row"><button class="tbtn warn" onclick="playOff(2)">One step up</button><button class="tbtn warn" onclick="playOff(4)">A 3rd up</button><button class="tbtn warn" onclick="playOff(7)">A 5th up</button></div>'+
  tunerHTML('tuner_tone')+
  '<div class="t-label">Hold for a slow count of 8</div>'+
  '<div class="hold"><button class="tbtn sec hold-btn" onclick="toggleHold()">▶ Hold count (8)</button><span class="toggle-chip'+(holdAuto?' on':'')+'" onclick="toggleHoldAuto(this)"><span class="tg"></span>Auto-start</span><div class="hold-meter"><div class="hold-num">8</div><div class="hold-prog"><i class="hold-bar"></i></div></div></div>'+
  '<div class="hold-res"></div>'+
  (lessonHasStep()?('<div class="t-label">Step drill — do · re · mi · re · do</div>'+
   '<div class="hold"><button class="tbtn sec step-btn" onclick="toggleStep()">▶ Step drill</button><div class="hold-meter"><div class="step-seq" id="stepSeq" style="font:600 15px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.04em;min-width:120px;text-align:center;opacity:.85">– – –</div></div></div>'+
   '<div class="step-res hold-res"></div>'+
   '<div class="t-hint">Drone the root, tuner on, then sing up the scale and back — do·re·mi·re·do — each note in tune with the drone, landing back on do. It auto-scores when you finish, or tap “Stop &amp; score”. Headphones essential here: the drone runs throughout.</div>'):'')+
  '<div class="t-hint">Play or drone a note, sing it on “ooh”, then hold steady. With <b>Auto-start</b> on and the live tuner running, the 8-count begins on its own once you’re holding the note and scores itself — a long silence resets it. Tap the button to run a count by hand, or switch Auto-start off. Use headphones so playback does not bleed into the mic.</div></div>';
 if(type==='interval')return '<div class="tool-panel"><div class="t-title">♪ Interval Trainer</div>'+
  '<div class="t-row">'+rootSelHTML()+'<button class="tbtn sec" onclick="randRoot()">↻ Random root</button>'+intSelHTML()+'</div>'+
  '<div class="t-row"><button class="tbtn" onclick="playRoot();setTarget(TS.root+TS.intv)">1 · Play root</button><button class="tbtn sec" onclick="setTarget(TS.root+TS.intv);playOff(TS.intv)">3 · Reveal answer</button><button class="tbtn sec" onclick="playBoth(TS.intv)">Both together</button></div>'+
  tunerHTML('tuner_interval')+
  '<div class="t-hint">Step 2 is you: sing the interval before pressing reveal. Turn on the tuner and watch for the LOCK as you hold it.</div></div>';
 if(type==='row')return '<div class="tool-panel"><div class="t-title">♪ Row Your Boat — in thirds</div>'+
  '<div class="t-row">'+keySelHTML()+'<span class="toggle-chip'+(TS.countin?' on':'')+'" onclick="toggleCountin(this)"><span class="tg"></span>Count-in</span></div>'+
  '<div class="slider-row"><label>Tempo</label><input type="range" min="60" max="200" value="'+TS.bpm+'" oninput="setBpm(this.value)"><span class="slider-val" id="bpmVal">'+TS.bpm+' bpm</span></div>'+
  '<div class="t-row"><button class="tbtn" onclick="playSeq(\'mel\')">▶ Melody only</button><button class="tbtn" onclick="playSeq(\'harm\')">▶ Harmony only</button><button class="tbtn sec" onclick="playSeq(\'mel\',true)">▶ Both together</button></div>'+
  tunerHTML('tuner_row')+
  '<div class="t-hint">Start slow and raise the tempo as the line locks in. Count-in gives you four clicks before the melody enters. Pick the key where both lines sit comfortably.</div></div>';

/* ===================== APP (path engine) ===================== */
const FLAT=[];MODULES.forEach(m=>m.lessons.forEach(l=>FLAT.push(l.id)));
let OK=false,S={};
function init(){
 try{localStorage.setItem('_t','1');localStorage.removeItem('_t');OK=true;}catch(e){OK=false;document.getElementById('sb').style.display='block';}
 if(OK){try{S=JSON.parse(localStorage.getItem('harmony_lessons_v1')||'{}');}catch(e){S={};}}
 if(S.__profile&&typeof S.__profile.root==='number')TS.root=S.__profile.root;
}
function persist(){if(OK)try{localStorage.setItem('harmony_lessons_v1',JSON.stringify(S));}catch(e){}}
function st(id){if(!S[id])S[id]={mastered:false,tasks:{},stds:{},notes:'',recorded:false,review:''};return S[id];}
function isMastered(id){return !!(S[id]&&S[id].mastered);}
function statusOf(id){if(isMastered(id))return 'mastered';const i=FLAT.indexOf(id);if(i===0)return 'available';return isMastered(FLAT[i-1])?'available':'locked';}
function lessonById(id){for(const m of MODULES)for(const l of m.lessons)if(l.id===id)return l;}
function moduleProgress(m){const tot=m.lessons.length;const done=m.lessons.filter(l=>isMastered(l.id)).length;return {done,tot};}
let view=1;
function renderNav(){
 const pset=!!profile();
 let h='<button class="ntab '+(view==='setup'?'active':'')+'" onclick="go(\'setup\')"><span class="mod-dot '+(pset?'done':'')+'"></span>M0</button>';
 h+=MODULES.map(m=>{const p=moduleProgress(m);const cls=p.done===p.tot?'done':(p.done>0?'part':'');const firstLocked=statusOf(m.lessons[0].id)==='locked';
  return '<button class="ntab '+(view===m.n?'active':'')+'" onclick="go('+m.n+')"><span class="mod-dot '+cls+'"></span>M'+m.n+(firstLocked?' <span class="lock">🔒</span>':'')+'</button>';}).join('');
 h+='<button class="ntab '+(view==='room'?'active':'')+'" onclick="go(\'room\')" style="color:'+(view==='room'?'var(--accent)':'var(--purple)')+'">♪ Practice Room</button>';
 h+='<button class="ntab '+(view==='ref'?'active':'')+'" onclick="go(\'ref\')">📖 Reference</button>';
 h+='<button class="ntab '+(view==='prog'?'active':'')+'" onclick="go(\'prog\')">📈 Progress</button>';
 document.getElementById('nav').innerHTML=h;
}
function go(v){stopDrone();stopPitch();stopMetro();stopHold();view=v;render();window.scrollTo({top:0});}
function render(){
 renderNav();const main=document.getElementById('main');
 if(view==='setup'){main.innerHTML=renderSetup();return;}
 if(view==='room'){main.innerHTML=renderRoom();return;}
 if(view==='ref'){main.innerHTML=renderRef();return;}
 if(view==='prog'){main.innerHTML=renderProg();return;}
 const m=MODULES.find(x=>x.n===view);const p=moduleProgress(m);const pct=Math.round(p.done/p.tot*100);
 let h='<div class="mod-head"><div class="mtag">Module '+m.n+'</div><h2>'+m.t+'</h2><p>'+m.g+'</p><div class="mod-prog"><div class="bar"><i style="width:'+pct+'%"></i></div><span>'+p.done+'/'+p.tot+'</span></div></div>';
 h+=m.lessons.map(l=>renderLesson(l)).join('');
 main.innerHTML=h;
}
function renderLesson(l){
 const s=statusOf(l.id);const cp=l.cp?'cp':'';
 const badge=l.cp?'◆':(s==='mastered'?'✓':(l.id.split('.')[1]||'★'));
 const statusTxt=s==='mastered'?'Mastered':s==='available'?(l.cp?'Ready':'Available'):'Locked';
 const chips=(l.time?'<span class="chip tempo">⏱ '+l.time+'</span>':'')+(l.covers?'<span class="chip '+(l.cp?'cp':'covers')+'">'+l.covers+'</span>':'')+(l.tool?'<span class="chip">♪ built-in tool</span>':'')+(l.cp?'<span class="chip cp">recording</span>':'');
 const onclick=s==='locked'?'':'onclick="openLesson(\''+l.id+'\')"';
 return '<div class="lesson '+s+' '+cp+'" '+onclick+'><div class="l-badge '+s+' '+cp+'">'+badge+'</div><div class="l-main"><div class="l-title">'+l.t+'</div><div class="l-focus">'+l.f+'</div><div class="l-chips">'+chips+'</div></div><div class="l-status '+s+'">'+(s==='locked'?'🔒 '+statusTxt:statusTxt)+'</div></div>';
}
let curId=null;
function openLesson(id){
 if(statusOf(id)==='locked')return;
 stopPitch();if(recOwner&&recOwner!==id){if(recURL)URL.revokeObjectURL(recURL);recURL=null;recOwner=null;}
 curId=id;const l=lessonById(id);const s=st(id);const mod=MODULES.find(m=>m.lessons.some(x=>x.id===id));
 document.getElementById('dCrumb').textContent='Module '+mod.n+' · '+(l.cp?'Checkpoint':'Lesson '+id);
 const meta=(l.time?'<span class="chip tempo">⏱ '+l.time+'</span>':'')+(l.covers?'<span class="chip '+(l.cp?'cp':'covers')+'">'+l.covers+'</span>':'');
 let h='<div class="d-title">'+l.t+'</div><div class="d-focus">'+l.f+'</div><div class="d-meta">'+meta+'</div>';
 if(l.tool)h+=toolHTML(l.tool);
 if(l.auto)h+='<div class="d-section"><div class="d-h">Live test log <span class="ll-auto">auto-scored</span></div><div class="lesson-log" id="lessonLog"></div></div>';
 if(l.cp){
  h+='<div class="d-section"><div class="d-h cp">What to record</div>'+l.rec.map(r=>'<div class="item"><div class="item-text">'+r+'</div></div>').join('')+'</div>';
  h+='<div class="d-section"><div class="d-h cp">Record it here</div>'+recorderHTML()+'</div>';
  h+='<div class="d-section"><div class="cp-note">📤 <b>Send the recording to Claude in chat.</b> I will listen for pitch accuracy, drift, scooping, and whether your line holds against the other voice — then give specific feedback. Paste the key points below so this checkpoint keeps a record.</div></div>';
  h+='<div class="d-section"><div class="d-h">Recording done</div><div class="item"><div class="check '+(s.recorded?'on':'')+'" onclick="toggleRec()"></div><div class="item-text">I have recorded this and sent it for review.</div></div></div>';
 } else {
  h+='<div class="d-section"><div class="d-h">Practise</div>'+l.tasks.map((t,i)=>'<div class="item"><div class="check '+(s.tasks[i]?'on':'')+'" onclick="toggleTask('+i+')"></div><div class="item-text">'+t+'</div></div>').join('')+'</div>';
 }
 h+='<div class="d-section"><div class="d-h std">Standard to pass'+(l.cp?'':' — tick when true')+'</div>'+l.stds.map((t,i)=>'<div class="item std"><div class="check std '+(s.stds[i]?'on':'')+'" onclick="toggleStd('+i+')"></div><div class="item-text">'+t+'</div></div>').join('')+'</div>';
 h+='<div class="d-section"><div class="d-h">'+(l.cp?'Review notes / self-assessment':'Practice log')+'</div><textarea class="notes" placeholder="'+(l.cp?'Paste Claude feedback or your own assessment...':'What locked in, your jump-drill score, what to chase next time...')+'" onchange="saveNotes(this.value)">'+((l.cp?s.review:s.notes)||'')+'</textarea></div>';
 const allStd=l.stds.every((_,i)=>s.stds[i]);const recOk=l.cp?s.recorded:true;const ready=allStd&&recOk;
 if(s.mastered){
  h+='<button class="master-btn done">✓ '+(l.cp?'Checkpoint passed':'Mastered')+' — next unlocked</button><button class="unmark" onclick="unmark()">un-mark this</button>';
 } else {
  h+='<button class="master-btn '+(ready?'ready':'notready')+'" '+(ready?'onclick="markMastered()"':'')+'>'+(l.cp?'Pass checkpoint':'Mark mastered')+' → unlock next</button>';
  if(!ready)h+='<div class="gate-hint">'+(l.cp&&!s.recorded?'Mark the recording done, and tick':'Tick')+' all standards above to unlock this.</div>';
 }
 document.getElementById('dBody').innerHTML=h;
 if(l.auto)paintLessonLog();
 document.getElementById('scrim').classList.add('open');document.getElementById('detail').classList.add('open');document.body.style.overflow='hidden';document.getElementById('detail').scrollTop=0;
}
function closeDetail(){stopDrone();stopPitch();stopHold();if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();document.getElementById('scrim').classList.remove('open');document.getElementById('detail').classList.remove('open');document.body.style.overflow='';render();}
function toggleTask(i){const s=st(curId);s.tasks[i]=!s.tasks[i];persist();openLesson(curId);}
function toggleStd(i){const s=st(curId);s.stds[i]=!s.stds[i];persist();openLesson(curId);}
function toggleRec(){const s=st(curId);s.recorded=!s.recorded;persist();openLesson(curId);}
function saveNotes(v){const s=st(curId);const l=lessonById(curId);if(l.cp)s.review=v;else s.notes=v;persist();}
function markMastered(){const s=st(curId);s.mastered=true;markDayActive();persist();const l=lessonById(curId);showToast((l.cp?'Checkpoint passed':'Mastered')+' — next unlocked');openLesson(curId);}
function unmark(){const s=st(curId);s.mastered=false;persist();openLesson(curId);}
/* ---- Practice Room ---- */
function renderRoom(){
 return '<div class="mod-head"><div class="mtag">Practice Room</div><h2>All the Tools</h2><p>The sound tools from the lessons, in one place — for warm-ups and free practice once you know the drills. Always warm up first: gentle humming, lip trills, sirens low to high.</p></div>'+
 '<button class="qd-cta" onclick="openQuick()">⚡ Start the 5-minute daily drill</button>'+
 toolHTML('tone')+toolHTML('interval')+toolHTML('row')+metroHTML()+
 '<div class="tool-panel"><div class="t-title">♪ Quick Recorder</div>'+recorderHTML()+'</div>'+
 '<div class="bcard"><div class="bcard-title">The 30–40 minute session</div><div class="bcard-sub">2–3 sessions a week · no calendar, only gates</div><div class="road">'+
 '<div class="road-row"><span class="road-tag">5 min</span><span class="road-body">Warm up — humming, lip trills, sirens. Never harmonize on a cold voice.</span></div>'+
 '<div class="road-row"><span class="road-tag">5 min</span><span class="road-body">Module 1 maintenance — one drone hold, whatever module you are in.</span></div>'+
 '<div class="road-row"><span class="road-tag">15–20 min</span><span class="road-body">Current lesson work.</span></div>'+
 '<div class="road-row"><span class="road-tag">5–10 min</span><span class="road-body">Sing for fun — end every session on a song you love. That is what keeps a no-deadline program alive.</span></div>'+
 '</div><p style="font-size:0.74rem;color:var(--muted);margin-top:12px;line-height:1.5">Only 10 minutes? Hit the <b>daily drill</b> button above — random-root thirds with the live tuner. Highest value per minute in the program.</p></div>';
}
/* ---- Reference ---- */
function renderRef(){
 const iv=[[4,'Major 3rd','do → mi · the harmony interval'],[3,'Minor 3rd','the darker third'],[5,'Perfect 4th','“Here Comes the Bride”'],[7,'Perfect 5th','first notes of “Twinkle Twinkle”'],[9,'Major 6th','“My Bon-nie”'],[12,'Octave','same note, higher floor']];
 const songs=[
  {t:'Start',c:'',b:'<b>All I Have to Do Is Dream</b> — Everly Brothers. Pure parallel thirds, both voices equal.'},
  {t:'Start',c:'',b:'<b>Bye Bye Love</b> — Everly Brothers. Same trick at a faster tempo.'},
  {t:'Easy',c:'',b:'<b>Jackson</b> — Johnny Cash & June Carter. Call-and-response; an easier entry into duet feel.'},
  {t:'Easy',c:'',b:'<b>The Sound of Silence</b> — Simon & Garfunkel. Thirds that occasionally split wider; slow and forgiving.'},
  {t:'Middle',c:'c',b:'<b>If I Fell</b> — The Beatles. Two genuinely independent lines in spots.'},
  {t:'Middle',c:'c',b:'<b>Emmylou</b> — First Aid Kit. Modern folk duo; sustained close harmony throughout.'},
  {t:'Harder',c:'peak',b:'<b>Poison &amp; Wine</b> — The Civil Wars. Dynamics and blend matter as much as the notes.'},
  {t:'Harder',c:'peak',b:'<b>Helplessly Hoping</b> — Crosby, Stills &amp; Nash. Three-part; pick one part and live there.'},
  {t:'Mando',c:'mando',b:'<b>月亮代表我的心</b> — Teresa Teng. Slow and forgiving — the Mandopop equivalent of a beginner ballad. Find the third over the chorus.'},
  {t:'Mando',c:'mando',b:'<b>小酒窝</b> — JJ Lin &amp; Charlene Choi. A genuine duet: call-and-response plus shared chorus lines.'},
  {t:'Mando',c:'mando',b:'<b>知足</b> — Mayday. Anthemic chorus with stacked harmony and octave doubling — sing the upper line over the lead.'},
  {t:'Mando',c:'mando',b:'<b>小幸运</b> — Hebe Tien. Sustained chorus lines with close-harmony backing in the production to copy.'},
 ];
 return '<div class="mod-head"><div class="mtag">Reference</div><h2>Intervals, Songs & Craft</h2><p>The orientation material: what the intervals sound like, the song ladder for Module 4, and how to isolate a harmony part from a record.</p></div>'+
 '<div class="bcard"><div class="bcard-title">Interval cheat-sheet</div><div class="bcard-sub">root fixed at C4 · tap to hear root → interval → both</div><div class="road">'+iv.map(p=>'<div class="road-row"><span class="road-tag">'+p[1]+'</span><span class="road-body" style="flex:1">'+p[2]+'</span><button class="tbtn sec" style="padding:6px 10px;font-size:0.68rem" onclick="TS.root=0;tone(0,0.8,0);tone('+p[0]+',0.8,0.9);tone(0,1.4,1.9,0.16);tone('+p[0]+',1.4,1.9,0.16)">▶</button></div>').join('')+'</div></div>'+
 '<div class="bcard"><div class="bcard-title">The song ladder</div><div class="bcard-sub">module 4 repertoire · in rough order of difficulty</div><div class="road">'+songs.map(r=>'<div class="road-row"><span class="road-tag '+r.c+'">'+r.t+'</span><span class="road-body">'+r.b+'</span></div>').join('')+'</div></div>'+
 '<div class="bcard"><div class="bcard-title">Isolating a harmony part</div><div class="bcard-sub">the module 4 toolbox</div><ul>'+
 '<li>Old records (Everly Brothers era) often pan the two voices left/right — headphones, pull one side out.</li>'+
 '<li>Stem-splitter apps (Moises, LALAL.AI) separate vocals from a track; some split double-tracked vocals too.</li>'+
 '<li>YouTube has “harmony only” / “isolated vocals” videos for most classic duets — search the song title + “harmony”.</li>'+
 '<li>No isolation available? Learn the melody cold first — then the other moving line you hear IS the harmony.</li>'+
 '</ul></div>'+
 '<div class="bcard"><div class="bcard-title">Blend — the other half of harmony</div><div class="bcard-sub">what separates correct from beautiful</div><ul>'+
 '<li>Match vowels: shape your “ooh” and “ah” the way the lead does, not your default way.</li>'+
 '<li>Match phrasing: start and end words exactly together — cutoffs sell the blend.</li>'+
 '<li>Sing harmony slightly softer than the lead; tuck underneath rather than compete.</li>'+
 '<li>Less vibrato than you would use solo — straight tone locks intervals tighter.</li>'+
 '</ul></div>'+
 '<div class="bcard"><div class="bcard-title">和声 in Mandopop</div><div class="bcard-sub">applying the method to your own repertoire</div><ul>'+
 '<li>The same reflex transfers: most Mandopop chorus harmony is a third above the melody, or an octave double on the hook — exactly Modules 2–4.</li>'+
 '<li>Choruses repeat heavily, so you get many tries per song — pick the chorus, not the verse, to harmonize first.</li>'+
 '<li>The harmony is often low in the mix under the lead. A stem-splitter (Moises) or the 伴奏 / karaoke version helps you hear the lead alone and sing your line against it.</li>'+
 '<li>Mandarin vowels are crisper than English — match the lead’s vowel shape exactly on held notes or the blend smears.</li>'+
 '<li>Ballads (月亮代表我的心) are the gentlest start; save fast, syllable-dense songs until thirds are automatic.</li>'+
 '</ul></div>';
}
/* ---- Progress ---- */
function renderProg(){
 const totL=FLAT.length;const doneL=FLAT.filter(isMastered).length;const pct=Math.round(doneL/totL*100);
 const cps=[];MODULES.forEach(m=>m.lessons.forEach(l=>{if(l.cp)cps.push(l);}));
 let h='<div class="mod-head"><div class="mtag">Progress</div><h2>Your Path</h2><p>'+doneL+' of '+totL+' lessons mastered. Each module unlocks the next as you pass its standards — no calendar, only gates.</p><div class="mod-prog"><div class="bar"><i style="width:'+pct+'%"></i></div><span>'+pct+'%</span></div></div>';
 const M=meta();
 h+='<div class="streak"><div class="streak-box"><div class="sk-n">'+(M.streak||0)+'</div><div class="sk-l">Day streak</div></div><div class="streak-box"><div class="sk-n">'+(M.best||0)+'</div><div class="sk-l">Best streak</div></div><div class="streak-box"><div class="sk-n">'+(M.quick||0)+'</div><div class="sk-l">Drills logged</div></div></div>';
 h+='<button class="qd-cta sec" onclick="openQuick()">⚡ Do today\u2019s 5-minute drill</button>';
 h+='<div class="bcard" style="margin-top:14px"><div class="bcard-title">Modules</div><div class="bcard-sub">tap a module tab to open its lessons</div>';
 MODULES.forEach(m=>{const p=moduleProgress(m);const locked=statusOf(m.lessons[0].id)==='locked';h+='<div class="pmod"><div class="pmod-n">M'+m.n+'</div><div class="pmod-t">'+m.t+(locked?' 🔒':'')+'</div><div class="pmod-c">'+p.done+'/'+p.tot+'</div></div>';});
 h+='</div><div class="bcard"><div class="bcard-title">Recording checkpoints</div><div class="bcard-sub">upload these to Claude for review</div>';
 cps.forEach(l=>{const done=isMastered(l.id);const open=statusOf(l.id)!=='locked';h+='<div class="pmod"><div class="pmod-n">'+(done?'✓':(open?'◆':'🔒'))+'</div><div class="pmod-t">'+l.t.replace('Checkpoint — ','')+'</div><div class="pmod-c">'+(done?'passed':(open?'ready':'locked'))+'</div></div>';});
 h+='</div>';
 return h;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doExport(){const blob=new Blob([JSON.stringify({lessons:S,exported:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='harmony-path-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('Backup downloaded');}
function doImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.lessons){S=d.lessons;persist();render();showToast('Progress restored');}}catch(e){showToast('Could not read that file');}};r.readAsText(f);ev.target.value='';}
function doReset(){if(!confirm('Erase all progress and start the path fresh? Export a backup first if unsure.'))return;S={};persist();render();showToast('Progress reset');}
init();
(function(){if(!profile()){view='setup';return;}for(const m of MODULES){if(m.lessons.some(l=>!isMastered(l.id))){view=m.n;break;}}})();
render();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
